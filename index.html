<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מנהל הזמנות | שקיות קוקטייל</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c3aed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="שקיות קוקטייל">
  <link rel="apple-touch-icon" href="icon.svg">

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <!-- SheetJS — Excel export -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

  <!-- JSZip — ZIP export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <!-- EmailJS — שליחת מיילים מהדפדפן -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #7c3aed; --primary-dark: #6d28d9; --primary-light: #ede9fe;
      --cyan: #0891b2; --cyan-light: #e0f2fe;
      --green: #059669; --green-light: #d1fae5;
      --amber: #d97706; --amber-light: #fef3c7;
      --blue: #2563eb; --blue-light: #dbeafe;
      --red: #dc2626; --red-light: #fee2e2;
      --gray-50: #f8fafc; --gray-100: #f1f5f9; --gray-200: #e2e8f0;
      --gray-300: #cbd5e1; --gray-400: #94a3b8; --gray-500: #64748b;
      --gray-600: #475569; --gray-700: #334155; --gray-800: #1e293b; --gray-900: #0f172a;
      --shadow: 0 1px 3px rgba(0,0,0,.10); --shadow-md: 0 4px 6px -1px rgba(0,0,0,.10);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.10); --shadow-xl: 0 20px 25px -5px rgba(0,0,0,.15);
      --r: 10px; --rlg: 14px; --rxl: 20px; --rfull: 9999px;
    }
    html { direction: rtl; }
    body { font-family: 'Heebo', sans-serif; background: #eef0fb; color: var(--gray-800); min-height: 100vh; }
    .app { min-height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    .hdr { background: linear-gradient(135deg,#7c3aed,#4338ca); color:#fff; position:sticky; top:0; z-index:100; box-shadow:var(--shadow-lg); }
    .hdr-in { max-width:1440px; margin:0 auto; padding:14px 28px; display:flex; align-items:center; justify-content:space-between; }
    .hdr-logo { display:flex; align-items:center; gap:12px; }
    .hdr-icon { font-size:34px; }
    .hdr-title { font-size:20px; font-weight:700; }
    .hdr-sub { font-size:12px; opacity:.75; }
    .sync-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#4ade80; margin-left:6px; animation:pulse 2s infinite; }
    .sync-dot.off { background:#f87171; animation:none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

    /* Tabs */
    .tabs { background:#fff; border-bottom:1px solid var(--gray-200); box-shadow:var(--shadow); }
    .tabs-in { max-width:1440px; margin:0 auto; padding:0 28px; display:flex; overflow-x:auto; }
    .tab { padding:14px 22px; font-size:14px; font-weight:500; color:var(--gray-500); background:none; border:none; border-bottom:3px solid transparent; cursor:pointer; font-family:inherit; transition:all .18s; white-space:nowrap; }
    .tab:hover { color:var(--primary); background:var(--primary-light); }
    .tab.act { color:var(--primary); border-bottom-color:var(--primary); font-weight:700; }

    /* Main */
    .main { flex:1; max-width:1440px; margin:0 auto; padding:24px 28px; width:100%; }

    /* Buttons */
    .btn { display:inline-flex; align-items:center; gap:6px; padding:9px 18px; border-radius:var(--r); font-size:14px; font-weight:600; cursor:pointer; border:none; font-family:inherit; transition:all .18s; white-space:nowrap; }
    .btn-white { background:#fff; color:var(--primary); box-shadow:var(--shadow); }
    .btn-white:hover { background:var(--primary-light); transform:translateY(-1px); }
    .btn-violet { background:var(--primary); color:#fff; }
    .btn-violet:hover { background:var(--primary-dark); transform:translateY(-1px); }
    .btn-outline { background:#fff; color:var(--gray-600); border:1.5px solid var(--gray-300); }
    .btn-outline:hover { background:var(--gray-50); }
    .btn-ghost { background:transparent; color:var(--gray-500); padding:6px 10px; border-radius:6px; border:none; cursor:pointer; font-size:14px; font-family:inherit; transition:all .18s; }
    .btn-ghost:hover { background:var(--gray-100); color:var(--gray-700); }
    .btn-del { background:transparent; color:var(--red); padding:6px 10px; border-radius:6px; border:none; cursor:pointer; font-size:14px; font-family:inherit; transition:all .18s; }
    .btn-del:hover { background:var(--red-light); }
    .btn-sm { padding:6px 14px; font-size:13px; }
    .btn-icon { padding:6px 10px; font-size:13px; }

    /* Stats */
    .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }
    .stat-card { background:#fff; border-radius:var(--rlg); padding:20px; box-shadow:var(--shadow); display:flex; align-items:center; gap:16px; transition:transform .18s,box-shadow .18s; }
    .stat-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); }
    .stat-icon { width:52px; height:52px; border-radius:var(--r); display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
    .si-violet { background:var(--primary-light); } .si-cyan { background:var(--cyan-light); }
    .si-green { background:var(--green-light); } .si-amber { background:var(--amber-light); }
    .si-red { background:var(--red-light); }
    .stat-val { font-size:22px; font-weight:700; color:var(--gray-900); }
    .stat-lbl { font-size:13px; color:var(--gray-500); }
    .stat-sub { font-size:11px; color:var(--gray-400); margin-top:2px; }

    /* Status row */
    .status-row { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
    .sc { background:#fff; border-radius:var(--rlg); padding:18px 22px; box-shadow:var(--shadow); display:flex; align-items:center; justify-content:space-between; border-right:5px solid transparent; transition:transform .18s; }
    .sc:hover { transform:translateY(-2px); }
    .sc-open { border-right-color:var(--amber); } .sc-ip { border-right-color:var(--blue); } .sc-closed { border-right-color:var(--green); }
    .sc-lbl { font-size:12px; color:var(--gray-500); }
    .sc-val { font-size:32px; font-weight:800; }
    .sc-open .sc-val { color:var(--amber); } .sc-ip .sc-val { color:var(--blue); } .sc-closed .sc-val { color:var(--green); }
    /* Status progress bar */
    .status-progress { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; }
    .sp-item { background:#fff; border-radius:var(--rlg); padding:12px 10px; box-shadow:var(--shadow); display:flex; flex-direction:column; align-items:center; gap:6px; border-top:4px solid transparent; transition:transform .18s; }
    .sp-item:hover { transform:translateY(-2px); }
    .sp-0 { border-top-color:#f59e0b; } .sp-1 { border-top-color:#3b82f6; }
    .sp-2 { border-top-color:#8b5cf6; } .sp-3 { border-top-color:#0891b2; }
    .sp-4 { border-top-color:#10b981; } .sp-5 { border-top-color:#059669; }
    .sp-icon { font-size:22px; }
    .sp-val { font-size:26px; font-weight:800; color:var(--gray-800); }
    .sp-lbl { font-size:10px; font-weight:600; color:var(--gray-500); text-align:center; line-height:1.4; }
    .sc-icon { font-size:30px; opacity:.5; }

    /* Card */
    .card { background:#fff; border-radius:var(--rlg); box-shadow:var(--shadow); overflow:hidden; }
    .card-hdr { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--gray-100); }
    .card-title { font-size:15px; font-weight:600; color:var(--gray-800); }

    /* Table */
    .tbl-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:13.5px; }
    th { background:var(--gray-50); padding:11px 14px; text-align:right; font-size:11.5px; font-weight:700; color:var(--gray-500); text-transform:uppercase; letter-spacing:.4px; border-bottom:1px solid var(--gray-200); white-space:nowrap; }
    td { padding:12px 14px; border-bottom:1px solid var(--gray-100); color:var(--gray-700); white-space:nowrap; }
    tr:last-child td { border-bottom:none; }
    tbody tr:hover td { background:#f8f6ff; }
    tfoot td { padding:10px 14px; }
    .td-b { font-weight:600; color:var(--gray-900); }
    .td-rev { font-weight:700; color:var(--cyan); }
    .td-prof { font-weight:700; color:var(--green); }
    .td-loss { font-weight:700; color:var(--red); }
    .td-c { text-align:center; }
    .td-note { max-width:160px; overflow:hidden; text-overflow:ellipsis; color:var(--gray-500); font-size:12px; }

    /* Badge */
    .badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:var(--rfull); font-size:12px; font-weight:600; white-space:nowrap; }
    .b-graphics  { background:#fef3c7; color:#78350f; }
    .b-photos    { background:#dbeafe; color:#1e3a8a; }
    .b-printed   { background:#ede9fe; color:#4c1d95; }
    .b-ready     { background:#e0f2fe; color:#075985; }
    .b-delivered { background:#d1fae5; color:#065f46; }
    .b-completed { background:#059669; color:#fff; }
    /* legacy */
    .b-open { background:var(--amber-light); color:#92400e; }
    .b-ip { background:var(--blue-light); color:#1e3a8a; }
    .b-closed { background:#059669; color:#fff; }

    /* Filters */
    .filters { background:#fff; border-radius:var(--rlg); padding:14px 20px; box-shadow:var(--shadow); display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
    .f-lbl { font-size:13px; color:var(--gray-500); font-weight:500; white-space:nowrap; }
    .f-sel { padding:7px 12px; border:1.5px solid var(--gray-200); border-radius:var(--r); font-size:13px; color:var(--gray-700); background:#fff; cursor:pointer; font-family:inherit; outline:none; direction:rtl; transition:border-color .18s; }
    .f-sel:focus { border-color:var(--primary); }
    .f-div { width:1px; height:20px; background:var(--gray-200); }
    .f-count { margin-right:auto; font-size:13px; color:var(--gray-400); font-weight:500; }
    .f-clear { background:var(--gray-100); color:var(--gray-600); border:none; padding:7px 14px; border-radius:var(--r); font-size:13px; cursor:pointer; font-family:inherit; font-weight:500; transition:all .18s; }
    .f-clear:hover { background:var(--gray-200); }
    .sum-bar { background:#fff; border-radius:var(--rlg); padding:12px 20px; box-shadow:var(--shadow); font-size:13px; color:var(--gray-500); }

    /* Empty state */
    .empty { text-align:center; padding:60px 20px; }
    .empty-icon { font-size:52px; opacity:.45; margin-bottom:14px; }
    .empty-txt { font-size:15px; color:var(--gray-500); margin-bottom:20px; }

    /* Modal */
    .overlay { position:fixed; inset:0; background:rgba(15,23,42,.55); z-index:1000; display:flex; align-items:center; justify-content:center; padding:20px; animation:fadeIn .18s ease; backdrop-filter:blur(2px); }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .modal { background:#fff; border-radius:var(--rxl); width:100%; max-width:700px; max-height:92vh; overflow-y:auto; box-shadow:var(--shadow-xl); animation:slideUp .2s ease; }
    @keyframes slideUp { from{transform:translateY(24px);opacity:0} to{transform:translateY(0);opacity:1} }
    .modal-hdr { display:flex; align-items:center; justify-content:space-between; padding:20px 24px; border-bottom:1px solid var(--gray-200); position:sticky; top:0; background:#fff; z-index:1; border-radius:var(--rxl) var(--rxl) 0 0; }
    .modal-title { font-size:17px; font-weight:700; color:var(--gray-900); }
    .modal-x { width:32px; height:32px; border-radius:var(--rfull); border:none; background:var(--gray-100); color:var(--gray-500); cursor:pointer; font-size:15px; display:flex; align-items:center; justify-content:center; transition:all .18s; }
    .modal-x:hover { background:var(--gray-200); }
    .modal-body { padding:24px; }
    .modal-ftr { display:flex; gap:12px; padding:16px 24px; border-top:1px solid var(--gray-200); background:var(--gray-50); border-radius:0 0 var(--rxl) var(--rxl); }

    /* Form */
    .fg { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .fg-full { grid-column:span 2; }
    .fg-sec { grid-column:span 2; font-size:12px; font-weight:700; color:var(--gray-400); text-transform:uppercase; letter-spacing:.8px; padding-bottom:8px; border-bottom:1px solid var(--gray-200); margin-bottom:4px; }
    .fgroup { display:flex; flex-direction:column; gap:5px; }
    .flbl { font-size:13px; font-weight:600; color:var(--gray-700); }
    .finp, .fsel, .ftxt { padding:9px 12px; border:1.5px solid var(--gray-200); border-radius:var(--r); font-size:14px; color:var(--gray-800); background:#fff; font-family:inherit; outline:none; direction:rtl; width:100%; transition:border-color .18s, box-shadow .18s; }
    .finp:focus, .fsel:focus, .ftxt:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(124,58,237,.10); }
    .ftxt { resize:vertical; min-height:76px; }
    .fhint { font-size:11px; color:var(--gray-400); }
    .finp-ro { background:var(--gray-50); color:var(--gray-500); cursor:default; }

    /* Calc box */
    .calc { background:linear-gradient(135deg,#f8f6ff,#eef0ff); border:1.5px solid #ddd6fe; border-radius:var(--rlg); padding:16px 20px; display:flex; align-items:center; justify-content:space-around; margin-top:18px; gap:12px; flex-wrap:wrap; }
    .ci { display:flex; flex-direction:column; align-items:center; gap:4px; flex:1; min-width:80px; }
    .ci-lbl { font-size:11px; color:var(--gray-500); font-weight:700; text-transform:uppercase; letter-spacing:.5px; text-align:center; }
    .ci-val { font-size:20px; font-weight:800; }
    .ci-rev { color:var(--cyan); } .ci-prof { color:var(--green); } .ci-loss { color:var(--red); } .ci-cost { color:var(--red); }
    .ci-op { font-size:22px; color:var(--gray-300); }

    /* P&L Card */
    .pnl-card { background:#fff; border-radius:var(--rlg); box-shadow:var(--shadow); overflow:hidden; }
    .pnl-hdr { background:linear-gradient(135deg,#1e293b,#334155); color:#fff; padding:16px 20px; display:flex; align-items:center; justify-content:space-between; }
    .pnl-hdr-title { font-size:15px; font-weight:700; }
    .pnl-hdr-sub { font-size:12px; opacity:.6; }
    .pnl-body { padding:0; }
    .pnl-row { display:flex; align-items:center; justify-content:space-between; padding:13px 20px; border-bottom:1px solid var(--gray-100); font-size:14px; }
    .pnl-row:last-child { border-bottom:none; }
    .pnl-row.pnl-total { background:linear-gradient(135deg,#f8f6ff,#eef0ff); font-weight:800; font-size:16px; padding:16px 20px; }
    .pnl-row.pnl-section { background:var(--gray-50); font-size:11px; font-weight:700; color:var(--gray-400); text-transform:uppercase; letter-spacing:.6px; padding:8px 20px; }
    .pnl-label { color:var(--gray-600); display:flex; align-items:center; gap:8px; }
    .pnl-amount { font-weight:700; }
    .pnl-amount.pos { color:var(--green); }
    .pnl-amount.neg { color:var(--red); }
    .pnl-amount.neu { color:var(--gray-700); }
    .pnl-input-wrap { display:flex; align-items:center; gap:8px; }
    .pnl-inp { padding:5px 10px; border:1.5px solid var(--gray-200); border-radius:8px; font-size:13px; font-weight:600; width:110px; text-align:left; direction:ltr; font-family:inherit; outline:none; transition:border-color .18s; }
    .pnl-inp:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(124,58,237,.10); }
    .pnl-divider { height:1px; background:var(--gray-200); margin:0 20px; }

    /* Extra expense rows */
    .exp-row { display:flex; align-items:center; gap:8px; padding:10px 20px; border-bottom:1px solid var(--gray-100); }
    .exp-inp { padding:6px 10px; border:1.5px solid var(--gray-200); border-radius:8px; font-size:13px; font-family:inherit; outline:none; transition:border-color .18s; }
    .exp-inp:focus { border-color:var(--primary); }
    .exp-inp-lbl { flex:1; }
    .exp-inp-amt { width:110px; direction:ltr; text-align:left; }
    .exp-add-btn { display:flex; align-items:center; gap:6px; padding:8px 16px; background:var(--gray-50); border:1.5px dashed var(--gray-300); border-radius:var(--r); font-size:13px; color:var(--gray-500); cursor:pointer; font-family:inherit; font-weight:500; transition:all .18s; width:calc(100% - 40px); justify-content:center; margin:8px 20px; }
    .exp-add-btn:hover { background:var(--primary-light); border-color:var(--primary); color:var(--primary); }

    /* Monthly */
    .month-hdr { padding:14px 20px; background:linear-gradient(135deg,#7c3aed,#4338ca); color:#fff; display:flex; align-items:center; justify-content:space-between; }
    .month-title { font-size:16px; font-weight:700; }
    .month-sub { font-size:12px; opacity:.75; }
    .mini-stats { display:grid; grid-template-columns:repeat(4,1fr); border-bottom:1px solid var(--gray-100); }
    .mini-item { padding:14px 16px; border-left:1px solid var(--gray-100); }
    .mini-item:last-child { border-left:none; }
    .mini-lbl { font-size:11px; color:var(--gray-400); font-weight:600; text-transform:uppercase; }
    .mini-val { font-size:18px; font-weight:700; }
    .v-cyan { color:var(--cyan); } .v-green { color:var(--green); } .v-amber { color:var(--amber); } .v-violet { color:var(--primary); } .v-red { color:var(--red); }
    .sum-grid { display:grid; grid-template-columns:repeat(4,1fr); }
    .sum-item { display:flex; flex-direction:column; align-items:center; padding:16px; border-left:1px solid var(--gray-100); gap:4px; }
    .sum-item:last-child { border-left:none; }
    .sum-val { font-size:22px; font-weight:800; }
    .sum-lbl { font-size:12px; color:var(--gray-500); }
    .section-title { font-size:16px; font-weight:700; color:var(--gray-700); }
    .dash { display:flex; flex-direction:column; gap:20px; }
    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    .phone-link { color:var(--primary); text-decoration:none; font-size:13px; }
    .phone-link:hover { text-decoration:underline; }
    .actions { display:flex; gap:4px; }
    .cursor-p { cursor:pointer; }

    /* Payment toggle */
    .pay-btn { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:var(--rfull); font-size:12px; font-weight:700; border:none; cursor:pointer; font-family:inherit; transition:all .15s; white-space:nowrap; }
    .pay-yes { background:var(--green-light); color:#064e3b; }
    .pay-yes:hover { background:#a7f3d0; }
    .pay-no { background:var(--red-light); color:#991b1b; }
    .pay-no:hover { background:#fecaca; }

    /* Setup screen */
    .setup-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; background:#eef0fb; padding:20px; }
    .setup-card { background:#fff; border-radius:24px; box-shadow:var(--shadow-xl); max-width:640px; width:100%; overflow:hidden; }
    .setup-hdr { background:linear-gradient(135deg,#7c3aed,#4338ca); color:#fff; padding:28px 32px; }
    .setup-hdr-title { font-size:22px; font-weight:800; margin-bottom:4px; }
    .setup-hdr-sub { font-size:13px; opacity:.8; }
    .setup-body { padding:28px 32px; }
    .setup-step { display:flex; gap:16px; margin-bottom:22px; align-items:flex-start; }
    .step-num { width:32px; height:32px; border-radius:50%; background:var(--primary-light); color:var(--primary); font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:2px; }
    .step-content { flex:1; }
    .step-title { font-size:14px; font-weight:700; color:var(--gray-800); margin-bottom:4px; }
    .step-desc { font-size:13px; color:var(--gray-500); line-height:1.6; }
    .step-link { color:var(--primary); font-weight:600; text-decoration:none; }
    .step-link:hover { text-decoration:underline; }

    /* Cocktail chips */
    .cocktail-chips { display:flex; flex-wrap:wrap; gap:5px; }
    .chip { display:inline-flex; align-items:center; padding:2px 9px; border-radius:var(--rfull); font-size:11px; font-weight:600; white-space:nowrap; }
    .chip-0 { background:#fce7f3; color:#9d174d; }
    .chip-1 { background:#e0f2fe; color:#075985; }
    .chip-2 { background:#fef3c7; color:#92400e; }
    .chip-3 { background:#d1fae5; color:#064e3b; }
    .chip-4 { background:#ede9fe; color:#4c1d95; }

const normalizeCocktail = (name) => {
  if (!name) return '';
  // מנקה רווחים כפולים + מאחד כל סוגי גרש/ציטוט לגרש רגיל
  const clean = s => s.toLowerCase().trim().replace(/\s+/g,' ').replace(/[׳'''\u2018\u2019`]/g,"'");
  const key = clean(name);
  // ניסיון ישיר במפה
  if (_COCKTAIL_MAP[key]) return _COCKTAIL_MAP[key];
  // ניסיון ללא גרש בכלל (לכיסוי כל הוריאציות)
  const keyNoApos = key.replace(/'/g,'');
  const foundNoApos = Object.entries(_COCKTAIL_MAP).find(([k])=>k.replace(/'/g,'')===keyNoApos);
  if (foundNoApos) return foundNoApos[1];

  return COCKTAIL_TYPES.find(c => c.toLowerCase() === key) || name.toUpperCase().trim();

// ── P&L Card ──
function PnLCard({ orders, settings, onUpdateSettings }) {
  const totalRev = orders.reduce((a,o)=>a+revenue(o),0);
  const totalBagCost = orders.reduce((a,o)=>a+bagCost(o),0);
  const totalGrossProfit = totalRev - totalBagCost;
  const marketing = Number(settings.marketing)||0;
  const extraItems = settings.extraItems || [];
  const totalExtra = extraItems.reduce((a,e)=>a+(Number(e.amount)||0),0);
  const totalFixed = marketing + totalExtra;
  const netProfit = totalGrossProfit - totalFixed;

  const updateMarketing = (val) => onUpdateSettings({...settings, marketing: Number(val)||0});

  const addExpense = () => {
    const newItems = [...extraItems, {id: Date.now().toString(), label: 'הוצאה חדשה', amount: 0}];
    onUpdateSettings({...settings, extraItems: newItems});
  };

  const updateExpense = (idx, field, val) => {
    const newItems = extraItems.map((e,i) => i===idx ? {...e, [field]: field==='amount'?Number(val)||0:val} : e);
    onUpdateSettings({...settings, extraItems: newItems});
  };

  const removeExpense = (idx) => {
    const newItems = extraItems.filter((_,i)=>i!==idx);
    onUpdateSettings({...settings, extraItems: newItems});
  };

  return (
    <div className="pnl-card">
      <div className="pnl-hdr">
        <div>
          <div className="pnl-hdr-title">💰 רווח והפסד — סיכום כולל</div>
          <div className="pnl-hdr-sub">כולל עלויות ייצור והוצאות קבועות</div>
        </div>
        <div style={{textAlign:'left',direction:'ltr'}}>
          <div style={{fontSize:22,fontWeight:800,color:netProfit>=0?'#4ade80':'#f87171'}}>{fmt(netProfit)}</div>
          <div style={{fontSize:11,opacity:.7}}>רווח נקי</div>
        </div>
      </div>
      <div className="pnl-body">
        <div className="pnl-row pnl-section"><span>הכנסות</span></div>
        <div className="pnl-row">
          <span className="pnl-label">📥 הכנסות מהזמנות ({orders.length})</span>
          <span className="pnl-amount pos">{fmt(totalRev)}</span>
        </div>
        <div className="pnl-row pnl-section"><span>עלויות משתנות</span></div>
        <div className="pnl-row">
          <span className="pnl-label">🛍️ עלות ייצור שקיות (₪{BAG_COST_PER_UNIT} × {orders.reduce((a,o)=>a+(Number(o.bagCount)||0),0).toLocaleString('he-IL')})</span>
          <span className="pnl-amount neg">-{fmt(totalBagCost)}</span>
        </div>
        <div className="pnl-row" style={{background:'var(--gray-50)',fontWeight:700}}>
          <span className="pnl-label" style={{fontWeight:700}}>= רווח גולמי</span>
          <span className="pnl-amount" style={{color:totalGrossProfit>=0?'var(--green)':'var(--red)',fontSize:15}}>{fmt(totalGrossProfit)}</span>
        </div>
        <div className="pnl-row pnl-section"><span>הוצאות קבועות</span></div>
        <div className="pnl-row">
          <span className="pnl-label">📣 שיווק</span>
          <div className="pnl-input-wrap">
            <span style={{fontSize:13,color:'var(--gray-400)'}}>₪</span>
            <input className="pnl-inp" type="number" min="0" step="100" value={marketing}
              onChange={e=>updateMarketing(e.target.value)} onBlur={e=>updateMarketing(e.target.value)}/>
          </div>
        </div>
        {extraItems.map((exp,idx)=>(
          <div key={exp.id} className="exp-row">
            <span style={{fontSize:13,color:'var(--red)',opacity:.6}}>📌</span>
            <input className="exp-inp exp-inp-lbl" type="text" value={exp.label}
              onChange={e=>updateExpense(idx,'label',e.target.value)} placeholder="שם הוצאה"/>
            <div style={{display:'flex',alignItems:'center',gap:4}}>
              <span style={{fontSize:13,color:'var(--gray-400)'}}>₪</span>
              <input className="exp-inp exp-inp-amt" type="number" min="0" value={exp.amount}
                onChange={e=>updateExpense(idx,'amount',e.target.value)}/>
            </div>
            <button className="btn-del" style={{padding:'4px 8px'}} onClick={()=>removeExpense(idx)}>🗑️</button>
          </div>
        ))}
        <button className="exp-add-btn" onClick={addExpense}>+ הוסף הוצאה</button>
        {totalFixed > 0 && (
          <div className="pnl-row">
            <span className="pnl-label" style={{fontWeight:600}}>סה״כ הוצאות קבועות</span>
            <span className="pnl-amount neg">-{fmt(totalFixed)}</span>

          <span style={{color:netProfit>=0?'var(--green)':'var(--red)',fontSize:20}}>{fmt(netProfit)}</span>
        </div>
      </div>

  const [f, setF] = useState({
    title: event?.title||'', date: event?.date||date||'',
    time: event?.time||'', notes: event?.notes||'',
  });
  const set = (k,v) => setF(p=>({...p,[k]:v}));
  const handleSubmit = (e) => {
    e.preventDefault();
    if (!f.title.trim()||!f.date) return;
    onSave({...f, type:'manual', createdAt:new Date().toISOString()});
  };
  const handleDelete = () => {
    if (window.confirm(`למחוק את האירוע "${event.title}"?`)) { onDelete(event.id); onClose(); }
  };
  return (
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal" style={{maxWidth:420}}>
        <div className="modal-hdr">
          <h2 className="modal-title">{event?'✏️ עריכת אירוע':'📌 הוספת אירוע ליומן'}</h2>
          <button className="modal-x" onClick={onClose}>✕</button>
        </div>
        <form onSubmit={handleSubmit}>
          <div className="modal-body">
            <div className="fg">
              <div className="fgroup"><label className="flbl">כותרת *</label><input className="finp" type="text" placeholder="תיאור האירוע" value={f.title} onChange={e=>set('title',e.target.value)} required autoFocus/></div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div className="fgroup"><label className="flbl">תאריך *</label><input className="finp" type="date" value={f.date} onChange={e=>set('date',e.target.value)} required/></div>
                <div className="fgroup"><label className="flbl">שעה</label><input className="finp" type="time" value={f.time} onChange={e=>set('time',e.target.value)}/></div>
              </div>
              <div className="fgroup"><label className="flbl">הערות</label><textarea className="finp" rows={3} style={{resize:'vertical'}} value={f.notes} onChange={e=>set('notes',e.target.value)} placeholder="הערות נוספות..."/></div>
            </div>
          </div>
          <div className="modal-foot">
            {event && <button type="button" className="btn btn-del" style={{marginLeft:'auto'}} onClick={handleDelete}>🗑️ מחק</button>}
            <button type="submit" className="btn btn-violet">שמור</button>
            <button type="button" className="btn btn-outline" onClick={onClose}>ביטול</button>
          </div>
        </form>
      </div>
    </div>
  );
}

// ── Reminder Modal ──
function ReminderModal({event, eventType, reminders, emailjsSettings, onSave, onDelete, onClose}) {
  const eventDate = event?.eventDate || event?.date || '';
  const defaultReminderDate = eventDate ? (() => {
    const d = new Date(eventDate + 'T12:00:00');
    d.setDate(d.getDate() - 1);
    return d.toISOString().split('T')[0];
  })() : new Date().toISOString().split('T')[0];

  const [f, setF] = useState({
    reminderDate: defaultReminderDate,
    reminderTime: '09:00',
    email: emailjsSettings?.defaultEmail || 'elram.malachi@gmail.com',
    message: '',
  });
  const set = (k,v) => setF(p=>({...p,[k]:v}));
  const eventTitle = eventType === 'order' ? event?.customerName : event?.title;
  const eventReminders = (reminders||[]).filter(r => r.eventId === event?.id);

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!f.reminderDate) return;
    onSave({
      eventId: event.id, eventType, eventTitle, eventDate,
      reminderDate: f.reminderDate, reminderTime: f.reminderTime,
      email: f.email || emailjsSettings?.defaultEmail || 'elram.malachi@gmail.com',
      message: f.message, sent: false, createdAt: new Date().toISOString(),
    });
  };

  const hasEjs = !!(emailjsSettings?.serviceId && emailjsSettings?.templateId && emailjsSettings?.publicKey);

  return (
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal" style={{maxWidth:440}}>
        <div className="modal-hdr">
          <h2 className="modal-title">🔔 תזכורת ל{eventType==='order'?'הזמנה':'אירוע'}</h2>
          <button className="modal-x" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div style={{background:'var(--primary-light)',borderRadius:8,padding:'10px 14px',marginBottom:14}}>
            <div style={{fontWeight:700,color:'var(--primary)'}}>{eventTitle||'—'}</div>
            {eventDate && <div style={{fontSize:12,color:'var(--gray-500)',marginTop:2}}>{fmtDate(eventDate)}</div>}
          </div>

          {eventReminders.length > 0 && (
            <div style={{marginBottom:14}}>
              <div style={{fontWeight:600,fontSize:13,color:'var(--gray-600)',marginBottom:8}}>תזכורות קיימות:</div>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {eventReminders.map(r=>(
                  <div key={r.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',background:r.sent?'var(--green-light)':'var(--amber-light)',borderRadius:8,border:`1px solid ${r.sent?'#6ee7b7':'#fcd34d'}`}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600}}>{fmtDate(r.reminderDate)} {r.reminderTime&&`| ${r.reminderTime}`}</div>
                      <div style={{fontSize:11,color:'var(--gray-500)'}}>{r.email}{r.sent?' ✅ נשלח':' ⏳ ממתין'}</div>
                      {r.message && <div style={{fontSize:11,color:'var(--gray-600)',marginTop:2}}>"{r.message}"</div>}
                    </div>
                    {!r.sent && <button className="btn btn-del" style={{fontSize:11,padding:'3px 8px'}} onClick={()=>onDelete(r.id)}>🗑️</button>}
                  </div>
                ))}
              </div>
            </div>
          )}

          <form onSubmit={handleSubmit}>
            <div style={{fontWeight:600,fontSize:13,color:'var(--gray-600)',marginBottom:8}}>+ תזכורת חדשה:</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div className="fgroup">
                <label className="flbl">תאריך תזכורת *</label>
                <input className="finp" type="date" value={f.reminderDate} onChange={e=>set('reminderDate',e.target.value)} required/>
              </div>
              <div className="fgroup">
                <label className="flbl">שעה</label>
                <input className="finp" type="time" value={f.reminderTime} onChange={e=>set('reminderTime',e.target.value)}/>
              </div>
            </div>
            <div className="fgroup" style={{marginTop:8}}>
              <label className="flbl">כתובת מייל</label>
              <input className="finp" type="email" value={f.email} onChange={e=>set('email',e.target.value)} placeholder="elram.malachi@gmail.com"/>
            </div>
            <div className="fgroup" style={{marginTop:8}}>
              <label className="flbl">הודעה (אופציונלי)</label>
              <input className="finp" type="text" value={f.message} onChange={e=>set('message',e.target.value)} placeholder="הכן שקיות, צור קשר עם לקוח..."/>
            </div>
            {!hasEjs && (
              <div style={{background:'var(--amber-light)',border:'1px solid #fcd34d',borderRadius:8,padding:'10px 12px',marginTop:10,fontSize:12,color:'#92400e'}}>
                ⚠️ כדי לשלוח מיילים יש להגדיר EmailJS (לחץ על ⚙️ הגדרות EmailJS ביומן)
              </div>
            )}
            <div className="modal-foot" style={{paddingTop:14,marginTop:14}}>
              <button type="submit" className="btn btn-violet">🔔 שמור תזכורת</button>
              <button type="button" className="btn btn-outline" onClick={onClose}>סגור</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  );
}

// ── Calendar View ──
function CalendarView({orders, calendarEvents, reminders, emailjsSettings, onEdit, onAddCalEvent, onEditCalEvent, onDeleteCalEvent, onAddReminder, onDeleteReminder, onUpdateEmailjsSettings}) {
  const [cur, setCur] = useState(() => { const d=new Date(); d.setDate(1); return d; });
  const [showCalModal, setShowCalModal] = useState(false);
  const [calModalDate, setCalModalDate] = useState('');
  const [editingCalEvent, setEditingCalEvent] = useState(null);
  const [showReminderModal, setShowReminderModal] = useState(false);
  const [reminderEvent, setReminderEvent] = useState(null);
  const [reminderEventType, setReminderEventType] = useState('order');
  const [showEjsSettings, setShowEjsSettings] = useState(false);
  const [ejsForm, setEjsForm] = useState({serviceId:'',templateId:'',publicKey:'',defaultEmail:'elram.malachi@gmail.com'});
  const year = cur.getFullYear();
  const month = cur.getMonth();

  // Sync local ejs form when settings load
  React.useEffect(()=>{ if(emailjsSettings) setEjsForm(s=>({...s,...emailjsSettings})); },[emailjsSettings]);

  const openReminder = (evt, type, e) => {
    if (e) e.stopPropagation();
    setReminderEvent(evt); setReminderEventType(type); setShowReminderModal(true);
  };
  const hasEjs = !!(emailjsSettings?.serviceId && emailjsSettings?.templateId && emailjsSettings?.publicKey);

  const fixedCells = useMemo(() => {
    const firstDow = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const daysInPrev = new Date(year, month, 0).getDate();
    const arr = [];
    for (let i = firstDow-1; i >= 0; i--) arr.push({day: daysInPrev-i, curr:false});
    for (let i = 1; i <= daysInMonth; i++) arr.push({day: i, curr:true});
    let nd = 1;
    while (arr.length % 7 !== 0) arr.push({day: nd++, curr:false});
    return arr;
  }, [year, month]);

  const today = new Date();
  const isToday = (cell) => cell.curr && cell.day===today.getDate() && month===today.getMonth() && year===today.getFullYear();

  const eventsForDay = (cell) => {
    if (!cell.curr) return {orders:[],manual:[]};
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(cell.day).padStart(2,'0')}`;
    return {
      orders: orders.filter(o=>o.eventDate===dateStr),
      manual: (calendarEvents||[]).filter(e=>e.date===dateStr),
    };
  };

  const monthOrders = useMemo(() => {
    const prefix = `${year}-${String(month+1).padStart(2,'0')}`;
    return orders.filter(o=>o.eventDate&&o.eventDate.startsWith(prefix));
  }, [orders, year, month]);

  const monthManual = useMemo(() => {
    const prefix = `${year}-${String(month+1).padStart(2,'0')}`;
    return (calendarEvents||[]).filter(e=>e.date&&e.date.startsWith(prefix));
  }, [calendarEvents, year, month]);

  const openAdd = (dateStr) => { setCalModalDate(dateStr); setEditingCalEvent(null); setShowCalModal(true); };
  const openEdit = (evt) => { setEditingCalEvent(evt); setCalModalDate(evt.date); setShowCalModal(true); };

  return (
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      {/* Legend */}
      <div className="card" style={{padding:'10px 16px'}}>
        <div style={{display:'flex',flexWrap:'wrap',gap:6,alignItems:'center'}}>
          <span style={{fontSize:11,fontWeight:700,color:'var(--gray-500)',marginLeft:4}}>צבע לפי סטטוס:</span>
          {STATUSES.map(s=>(
            <span key={s.id} className={`cal-event cal-event-${s.id}`} style={{position:'static',display:'inline-block',fontSize:10,padding:'2px 7px',marginBottom:0}}>
              {s.icon} {s.label}
            </span>
          ))}
          <span className="cal-event cal-event-manual" style={{position:'static',display:'inline-block',fontSize:10,padding:'2px 7px',marginBottom:0}}>📌 ידני</span>
        </div>
      </div>

      <div className="card">
        <div className="card-hdr" style={{flexDirection:'column',alignItems:'stretch',padding:'16px 20px 12px'}}>
          <div className="cal-nav">
            <button className="btn btn-outline btn-sm" onClick={()=>setCur(new Date(year,month-1,1))}>→ חודש קודם</button>
            <span className="cal-nav-title">{MONTH_NAMES[month]} {year}</span>
            <button className="btn btn-outline btn-sm" onClick={()=>setCur(new Date(year,month+1,1))}>חודש הבא ←</button>
          </div>
          <div style={{display:'flex',gap:12,justifyContent:'center',alignItems:'center',marginTop:6,flexWrap:'wrap'}}>
            <span style={{fontSize:12,color:'var(--gray-400)'}}>{monthOrders.length} הזמנות</span>
            <span style={{fontSize:12,color:'#be185d'}}>{monthManual.length} ידניים</span>
            <button className="btn btn-sm" style={{background:'#fce7f3',color:'#be185d',border:'1px solid #f9a8d4',fontSize:11,padding:'3px 12px',borderRadius:20}}
              onClick={()=>openAdd(`${year}-${String(month+1).padStart(2,'0')}-01`)}>
              + הוסף אירוע ידני
            </button>
          </div>
        </div>
        <div className="cal-wrap">
          <div className="cal-dow">{DOW_HE.map(d=><div key={d} className="cal-dow-cell">{d}</div>)}</div>
          <div className="cal-grid">
            {fixedCells.map((cell,i) => {
              const {orders:dayOrders, manual:dayManual} = eventsForDay(cell);
              const dateStr = cell.curr ? `${year}-${String(month+1).padStart(2,'0')}-${String(cell.day).padStart(2,'0')}` : '';
              return (
                <div key={i} className={`cal-day ${!cell.curr?'other-month':''} ${isToday(cell)?'is-today':''}`}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:2}}>
                    <div className="cal-day-num">{cell.day}</div>
                    {cell.curr && <button className="cal-day-add" onClick={()=>openAdd(dateStr)}>+</button>}
                  </div>
                  {dayOrders.map(o=>(
                    <div key={o.id}
                      className={`cal-event cal-event-${o.status||'graphics'} ${o.notes?'has-notes':''}`}
                      title={`${o.customerName} — ${o.eventType||''}\nסטטוס: ${STATUSES.find(s=>s.id===o.status)?.label||''}\nמיקום: ${o.eventLocation||'—'}\n${o.notes||''}`}
                      onClick={()=>onEdit(o)}>
                      {o.customerName}
                    </div>
                  ))}
                  {dayManual.map(e=>(
                    <div key={e.id}
                      className={`cal-event cal-event-manual ${e.notes?'has-notes':''}`}
                      title={`${e.title}${e.time?'\n'+e.time:''}${e.notes?'\n'+e.notes:''}`}
                      onClick={()=>openEdit(e)}>
                      📌 {e.title}
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Month list */}
      {(monthOrders.length>0||monthManual.length>0) && (
        <div className="card">
          <div className="card-hdr"><span className="card-title">📋 אירועים ב{MONTH_NAMES[month]}</span></div>
          {monthOrders.length>0 && (
            <div className="tbl-wrap">
              <table>
                <thead><tr><th>לקוח</th><th>תאריך</th><th>סוג אירוע</th><th>שקיות</th><th>מיקום</th><th>איסוף/משלוח</th><th>סגר</th><th>סטטוס</th><th>הערות</th><th>🔔</th></tr></thead>
                <tbody>
                  {[...monthOrders].sort((a,b)=>new Date(a.eventDate)-new Date(b.eventDate)).map(o=>{
                    const hasReminder = (reminders||[]).some(r=>r.eventId===o.id&&!r.sent);
                    return (
                      <tr key={o.id} className="cursor-p" onClick={()=>onEdit(o)}>
                        <td className="td-b">{o.customerName}</td>
                        <td>{fmtDate(o.eventDate)}</td>
                        <td style={{color:'var(--gray-500)',fontSize:12}}>{o.eventType||'—'}</td>
                        <td className="td-c" style={{fontWeight:600}}>{o.bagCount}</td>
                        <td style={{fontSize:12}}>{o.eventLocation||'—'}</td>
                        <td>{o.deliveryType?<span style={{fontWeight:700,color:DELIVERY_TYPE_COLOR[o.deliveryType]||'var(--gray-600)'}}>{o.deliveryType}</span>:'—'}</td>
                        <td><TeamTag who={o.closedBy}/></td>
                        <td><Badge status={o.status}/></td>
                        <td className="td-note" title={o.notes||''}>{o.notes||'—'}</td>
                        <td className="td-c"><button className="btn-ghost" style={{fontSize:13,background:hasReminder?'var(--amber-light)':undefined,borderRadius:6,padding:'2px 6px'}} title="תזכורות" onClick={e=>openReminder(o,'order',e)}>{hasReminder?'🔔':'🔕'}</button></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
          {monthManual.length>0 && (
            <div style={{padding:'8px 16px',borderTop: monthOrders.length>0?'1px solid var(--gray-100)':'none'}}>
              <div style={{fontWeight:700,fontSize:13,color:'#be185d',marginBottom:8}}>📌 אירועים ידניים</div>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {[...monthManual].sort((a,b)=>a.date.localeCompare(b.date)).map(e=>{
                  const hasReminder = (reminders||[]).some(r=>r.eventId===e.id&&!r.sent);
                  return (
                    <div key={e.id} style={{display:'flex',alignItems:'center',gap:12,padding:'8px 12px',background:'#fdf2f8',borderRadius:8,border:'1px solid #fbcfe8'}}>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:600,color:'#9d174d'}}>{e.title}</div>
                        <div style={{fontSize:12,color:'var(--gray-500)',marginTop:2}}>
                          {fmtDate(e.date)}{e.time?` | ${e.time}`:''}{e.notes?` | ${e.notes}`:''}
                        </div>
                      </div>
                      <button className="btn-ghost" style={{fontSize:12}} title="תזכורת" onClick={ev=>openReminder(e,'manual',ev)}>{hasReminder?'🔔':'🔕'}</button>
                      <button className="btn-ghost" style={{fontSize:12}} onClick={()=>openEdit(e)}>✏️</button>
                      <button className="btn-del" onClick={()=>{if(window.confirm('למחוק אירוע זה?'))onDeleteCalEvent(e.id);}}>🗑️</button>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      )}

      {/* EmailJS Settings */}
      <div className="card" style={{borderTop:'3px solid var(--primary)'}}>
        <div className="card-hdr" style={{cursor:'pointer'}} onClick={()=>setShowEjsSettings(v=>!v)}>
          <span className="card-title">⚙️ הגדרות EmailJS (שליחת תזכורות למייל)</span>
          <span style={{marginRight:'auto',color:hasEjs?'var(--green)':'var(--amber)',fontWeight:700,fontSize:12}}>
            {hasEjs?'✅ מחובר':'⚠️ לא מוגדר'}
          </span>
          <button className="btn-ghost" style={{fontSize:12,marginRight:8}}>{showEjsSettings?'▲ סגור':'▼ פתח'}</button>
        </div>
        {showEjsSettings && (
          <div style={{padding:'16px 20px 20px'}}>
            <div style={{background:'var(--blue-light)',borderRadius:8,padding:'10px 14px',marginBottom:14,fontSize:12,color:'var(--blue)'}}>
              <b>כיצד להגדיר:</b><br/>
              1. צור חשבון ב־<a href="https://www.emailjs.com" target="_blank" rel="noreferrer" style={{color:'inherit'}}>emailjs.com</a> (חינמי — 200 מיילים/חודש)<br/>
              2. הוסף Email Service (Gmail מומלץ) → קבל Service ID<br/>
              3. צור Email Template עם המשתנים: <code>{'{{event_title}}'}</code>, <code>{'{{event_date}}'}</code>, <code>{'{{reminder_message}}'}</code>, <code>{'{{to_email}}'}</code><br/>
              4. מ-Account → API Keys קבל את ה-Public Key
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div className="fgroup">
                <label className="flbl">Service ID</label>
                <input className="finp" type="text" value={ejsForm.serviceId} onChange={e=>setEjsForm(f=>({...f,serviceId:e.target.value}))} placeholder="service_xxxxxxx"/>
              </div>
              <div className="fgroup">
                <label className="flbl">Template ID</label>
                <input className="finp" type="text" value={ejsForm.templateId} onChange={e=>setEjsForm(f=>({...f,templateId:e.target.value}))} placeholder="template_xxxxxxx"/>
              </div>
              <div className="fgroup">
                <label className="flbl">Public Key</label>
                <input className="finp" type="text" value={ejsForm.publicKey} onChange={e=>setEjsForm(f=>({...f,publicKey:e.target.value}))} placeholder="xxxxxxxxxxxxxxxxxxxx"/>
              </div>
              <div className="fgroup">
                <label className="flbl">מייל ברירת מחדל</label>
                <input className="finp" type="email" value={ejsForm.defaultEmail} onChange={e=>setEjsForm(f=>({...f,defaultEmail:e.target.value}))} placeholder="elram.malachi@gmail.com"/>
              </div>
            </div>
            <div style={{display:'flex',gap:10,marginTop:12}}>
              <button className="btn btn-violet" onClick={()=>{onUpdateEmailjsSettings(ejsForm);setShowEjsSettings(false);alert('✅ הגדרות EmailJS נשמרו!');}}>💾 שמור הגדרות</button>
              {hasEjs && <button className="btn btn-outline" onClick={()=>{
                const ejs = emailjsSettings;
                emailjs.send(ejs.serviceId, ejs.templateId, {
                  to_email: ejs.defaultEmail || 'elram.malachi@gmail.com',
                  event_title: 'בדיקת תזכורת', event_date: fmtDate(new Date().toISOString().split('T')[0]),
                  reminder_message: 'זוהי הודעת בדיקה ממנהל ההזמנות שלך 🍹',
                }, ejs.publicKey).then(()=>alert('✅ מייל בדיקה נשלח!')).catch(e=>alert('❌ שגיאה: '+e.text));
              }}>📧 שלח מייל בדיקה</button>}
            </div>
          </div>
        )}
      </div>

      {showCalModal && (
        <CalendarEventModal
          date={calModalDate}
          event={editingCalEvent}
          onSave={(data) => {
            if (editingCalEvent) onEditCalEvent(editingCalEvent.id, data);
            else onAddCalEvent(data);
            setShowCalModal(false);
          }}
          onDelete={(id) => { onDeleteCalEvent(id); setShowCalModal(false); }}
          onClose={()=>setShowCalModal(false)}
        />
      )}
      {showReminderModal && reminderEvent && (
        <ReminderModal
          event={reminderEvent}
          eventType={reminderEventType}
          reminders={reminders}
          emailjsSettings={emailjsSettings}
          onSave={(data) => { onAddReminder(data); setShowReminderModal(false); }}
          onDelete={(id) => onDeleteReminder(id)}
          onClose={()=>setShowReminderModal(false)}
        />
      )}
    </div>
  );
}

// ── Transactions View ──
function TransactionsView({transactions, onAdd, onDelete, onUpdate, fixedExpenses, onAddFixedExpense, onDeleteFixedExpense}) {
  const [showForm, setShowForm] = useState(false);
  const today = new Date().toISOString().split('T')[0];
  const currentYM = () => { const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`; };
  const MONTH_NAMES_FE = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  const fmtMonth = (ym) => { if(!ym)return'—'; const[y,m]=ym.split('-'); return `${MONTH_NAMES_FE[parseInt(m)-1]} ${y}`; };

  // Fixed expenses UI state
  const [showRecForm, setShowRecForm] = useState(false);
  const [showOneForm, setShowOneForm] = useState(false);
  const [recForm, setRecForm] = useState({name:'', amount:'', startMonth:currentYM(), endMonth:'', category:''});
  const [oneForm, setOneForm] = useState({name:'', amount:'', month:currentYM(), category:''});
  const setRF = (k,v) => setRecForm(p=>({...p,[k]:v}));
  const setOF = (k,v) => setOneForm(p=>({...p,[k]:v}));
  const FE_CATS = ['שיווק / פרסום','שכירות / אחסון','עמלות (Stripe, פייפאל)','ציוד','הוצאות משרד','אחר'];

  const handleAddRec = (e) => {
    e.preventDefault();
    if (!recForm.name.trim() || !recForm.amount) return;
    onAddFixedExpense({name:recForm.name.trim(), amount:Number(recForm.amount), isRecurring:true, startMonth:recForm.startMonth, endMonth:recForm.endMonth||null, month:null, category:recForm.category});
    setRecForm({name:'', amount:'', startMonth:currentYM(), endMonth:'', category:''});
    setShowRecForm(false);
  };
  const handleAddOne = (e) => {
    e.preventDefault();
    if (!oneForm.name.trim() || !oneForm.amount) return;
    onAddFixedExpense({name:oneForm.name.trim(), amount:Number(oneForm.amount), isRecurring:false, startMonth:null, endMonth:null, month:oneForm.month, category:oneForm.category});
    setOneForm({name:'', amount:'', month:currentYM(), category:''});
    setShowOneForm(false);
  };

  const recurringList = fixedExpenses.filter(e=>e.isRecurring);
  const onetimeList   = fixedExpenses.filter(e=>!e.isRecurring);
  const ym = currentYM();
  const monthlyRecurringTotal = recurringList.filter(e=>e.startMonth<=ym&&(!e.endMonth||e.endMonth>=ym)).reduce((s,e)=>s+(Number(e.amount)||0),0);
  const [form, setForm] = useState({type:'income', description:'', amount:'', who:'בוזבאגס', date:today});
  const setF = (k,v) => setForm(p=>({...p,[k]:v}));
  const [editTx, setEditTx] = useState(null); // transaction being edited
  const [editForm, setEditForm] = useState({});
  const setEF = (k,v) => setEditForm(p=>({...p,[k]:v}));
  const openEdit = (t) => { setEditTx(t); setEditForm({type:t.type, description:t.description, amount:t.amount, who:t.who, date:t.date||today}); };
  const handleEditSave = (e) => {
    e.preventDefault();
    if (!editForm.description.trim() || !editForm.amount) return;
    onUpdate(editTx.id, {...editForm, amount: Number(editForm.amount)});
    setEditTx(null);
  };

  // ── פילטרים ומיון ──
  const [txType,   setTxType]   = useState('all');       // 'all' | 'income' | 'expense'
  const [txWho,    setTxWho]    = useState('all');        // 'all' | 'בוזבאגס' | 'מלאכי' | 'יותם'
  const [txPeriod, setTxPeriod] = useState('all');        // 'all' | '7' | '30' | '90' | 'custom'
  const [txFrom,   setTxFrom]   = useState('');
  const [txTo,     setTxTo]     = useState('');
  const [txSort,   setTxSort]   = useState('date_desc'); // 'date_desc' | 'date_asc' | 'amount_desc' | 'amount_asc'

  const txDate = t => t.date || (t.createdAt ? t.createdAt.slice(0,10) : '');

  const visibleTx = useMemo(() => {
    let list = [...transactions];
    // סוג
    if (txType !== 'all') list = list.filter(t => t.type === txType);
    // חשבון
    if (txWho !== 'all') list = list.filter(t => t.who === txWho);
    // תקופה
    if (txPeriod !== 'all' && txPeriod !== 'custom') {
      const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - Number(txPeriod));
      const cutoffStr = cutoff.toISOString().slice(0,10);
      list = list.filter(t => txDate(t) >= cutoffStr);
    }
    if (txPeriod === 'custom') {
      if (txFrom) list = list.filter(t => txDate(t) >= txFrom);
      if (txTo)   list = list.filter(t => txDate(t) <= txTo);
    }
    return list;
  }, [transactions, txType, txWho, txPeriod, txFrom, txTo]);

  const filteredSorted = useMemo(() => {
    return [...visibleTx].sort((a,b) => {
      if (txSort === 'date_asc')    return txDate(a).localeCompare(txDate(b));
      if (txSort === 'date_desc')   return txDate(b).localeCompare(txDate(a));
      if (txSort === 'amount_desc') return (Number(b.amount)||0) - (Number(a.amount)||0);
      if (txSort === 'amount_asc')  return (Number(a.amount)||0) - (Number(b.amount)||0);
      return 0;
    });
  }, [visibleTx, txSort]);

  const totals = useMemo(() => {
    const income  = visibleTx.filter(t=>t.type==='income').reduce((a,t)=>a+(Number(t.amount)||0),0);
    const expense = visibleTx.filter(t=>t.type==='expense').reduce((a,t)=>a+(Number(t.amount)||0),0);
    const byPerson = (name) => ({
      income:  visibleTx.filter(t=>t.who===name&&t.type==='income').reduce((a,t)=>a+(Number(t.amount)||0),0),
      expense: visibleTx.filter(t=>t.who===name&&t.type==='expense').reduce((a,t)=>a+(Number(t.amount)||0),0),
    });
    const perPerson = TEAM.reduce((acc,name)=>({...acc,[name]:byPerson(name)}),{});
    return { income, expense, net: income-expense, perPerson };
  }, [visibleTx]);

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!form.description.trim() || !form.amount) return;
    onAdd({...form, amount: Number(form.amount), createdAt: new Date().toISOString()});
    setForm({type:'income', description:'', amount:'', who:'בוזבאגס', date:today});
    setShowForm(false);
  };

  const hasFilter = txType!=='all' || txWho!=='all' || txPeriod!=='all' || txFrom || txTo;

  const periodLabel = txPeriod==='7'?'7 ימים':txPeriod==='30'?'30 ימים':txPeriod==='90'?'3 חודשים':txPeriod==='custom'?'טווח מותאם':'כל הזמן';

  return (
    <div style={{display:'flex',flexDirection:'column',gap:16}}>

      {/* ══ הוצאות קבועות ══ */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>

        {/* הוצאות חוזרות */}
        <div className="card" style={{borderTop:'4px solid var(--primary)'}}>
          <div className="card-hdr">
            <span className="card-title">🔄 הוצאות קבועות חוזרות</span>
            <button className="btn btn-violet btn-sm" onClick={()=>setShowRecForm(p=>!p)}>+ הוסף</button>
          </div>
          <div style={{padding:'4px 20px 8px',fontSize:12,color:'var(--gray-400)'}}>מתווספות אוטומטית לכל חודש בסיכום החודשי · סה״כ חודשי: <strong style={{color:'var(--red)'}}>{fmt(monthlyRecurringTotal)}</strong></div>
          {showRecForm && (
            <form onSubmit={handleAddRec} style={{padding:'12px 16px',borderBottom:'1px solid var(--gray-200)',background:'var(--gray-50)',display:'flex',flexWrap:'wrap',gap:8,alignItems:'flex-end'}}>
              <div className="fgroup" style={{flex:2,minWidth:120}}><label className="flbl">שם *</label><input className="finp" placeholder="לדוגמה: שיווק פייסבוק" value={recForm.name} onChange={e=>setRF('name',e.target.value)} required/></div>
              <div className="fgroup" style={{minWidth:90}}><label className="flbl">סכום ₪ *</label><input className="finp" type="number" min="1" placeholder="0" value={recForm.amount} onChange={e=>setRF('amount',e.target.value)} required dir="ltr" style={{textAlign:'right'}}/></div>
              <div className="fgroup" style={{minWidth:120}}><label className="flbl">מ-חודש *</label><input className="finp" type="month" value={recForm.startMonth} onChange={e=>setRF('startMonth',e.target.value)}/></div>
              <div className="fgroup" style={{minWidth:120}}><label className="flbl">עד חודש (ריק=ללא הגבלה)</label><input className="finp" type="month" value={recForm.endMonth} onChange={e=>setRF('endMonth',e.target.value)}/></div>
              <div className="fgroup" style={{minWidth:130}}><label className="flbl">קטגוריה</label><select className="fsel" value={recForm.category} onChange={e=>setRF('category',e.target.value)}><option value="">— בחר —</option>{FE_CATS.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
              <div style={{display:'flex',gap:8,paddingBottom:2}}><button type="submit" className="btn btn-violet btn-sm">שמור</button><button type="button" className="btn btn-outline btn-sm" onClick={()=>setShowRecForm(false)}>ביטול</button></div>
            </form>
          )}
          {recurringList.length===0 ? (
            <div className="empty" style={{padding:'20px'}}><div className="empty-icon" style={{fontSize:28}}>🔄</div><p className="empty-txt" style={{fontSize:13}}>אין הוצאות חוזרות</p></div>
          ) : (
            <div className="tbl-wrap"><table>
              <thead><tr><th>שם</th><th>סכום/חודש</th><th>מ-חודש</th><th>עד חודש</th><th></th></tr></thead>
              <tbody>{recurringList.map(e=>{
                const active=!e.endMonth||e.endMonth>=ym;
                return(<tr key={e.id}>
                  <td className="td-b">{e.name}{e.category?<span style={{fontSize:11,color:'var(--gray-400)',marginRight:6}}>{e.category}</span>:null}</td>
                  <td style={{color:'var(--red)',fontWeight:700}}>{fmt(e.amount)}</td>
                  <td style={{fontSize:12}}>{fmtMonth(e.startMonth)}</td>
                  <td style={{fontSize:12}}>{e.endMonth?fmtMonth(e.endMonth):<span style={{color:'var(--green)',fontSize:12}}>ללא הגבלה</span>}</td>
                  <td><button className="btn-del" onClick={()=>onDeleteFixedExpense(e.id)}>🗑️</button></td>
                </tr>);
              })}</tbody>
            </table></div>
          )}
        </div>

        {/* הוצאות חד-פעמיות */}
        <div className="card" style={{borderTop:'4px solid var(--cyan)'}}>
          <div className="card-hdr">
            <span className="card-title">1️⃣ הוצאות קבועות חד-פעמיות</span>
            <button className="btn btn-outline btn-sm" onClick={()=>setShowOneForm(p=>!p)}>+ הוסף</button>
          </div>
          <div style={{padding:'4px 20px 8px',fontSize:12,color:'var(--gray-400)'}}>מופיעות בחודש ספציפי בלבד בסיכום החודשי</div>
          {showOneForm && (
            <form onSubmit={handleAddOne} style={{padding:'12px 16px',borderBottom:'1px solid var(--gray-200)',background:'var(--gray-50)',display:'flex',flexWrap:'wrap',gap:8,alignItems:'flex-end'}}>
              <div className="fgroup" style={{flex:2,minWidth:120}}><label className="flbl">שם *</label><input className="finp" placeholder="לדוגמה: קמפיין מרץ" value={oneForm.name} onChange={e=>setOF('name',e.target.value)} required/></div>
              <div className="fgroup" style={{minWidth:90}}><label className="flbl">סכום ₪ *</label><input className="finp" type="number" min="1" placeholder="0" value={oneForm.amount} onChange={e=>setOF('amount',e.target.value)} required dir="ltr" style={{textAlign:'right'}}/></div>
              <div className="fgroup" style={{minWidth:130}}><label className="flbl">חודש *</label><input className="finp" type="month" value={oneForm.month} onChange={e=>setOF('month',e.target.value)}/></div>
              <div className="fgroup" style={{minWidth:130}}><label className="flbl">קטגוריה</label><select className="fsel" value={oneForm.category} onChange={e=>setOF('category',e.target.value)}><option value="">— בחר —</option>{FE_CATS.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
              <div style={{display:'flex',gap:8,paddingBottom:2}}><button type="submit" className="btn btn-outline btn-sm">שמור</button><button type="button" className="btn btn-ghost btn-sm" onClick={()=>setShowOneForm(false)}>ביטול</button></div>
            </form>
          )}
          {onetimeList.length===0 ? (
            <div className="empty" style={{padding:'20px'}}><div className="empty-icon" style={{fontSize:28}}>1️⃣</div><p className="empty-txt" style={{fontSize:13}}>אין הוצאות חד-פעמיות</p></div>
          ) : (
            <div className="tbl-wrap"><table>
              <thead><tr><th>שם</th><th>סכום</th><th>חודש</th><th></th></tr></thead>
              <tbody>{[...onetimeList].sort((a,b)=>(b.month||'').localeCompare(a.month||'')).map(e=>(
                <tr key={e.id}>
                  <td className="td-b">{e.name}{e.category?<span style={{fontSize:11,color:'var(--gray-400)',marginRight:6}}>{e.category}</span>:null}</td>
                  <td style={{color:'var(--red)',fontWeight:700}}>{fmt(e.amount)}</td>
                  <td style={{fontSize:12}}>{fmtMonth(e.month)}</td>
                  <td><button className="btn-del" onClick={()=>onDeleteFixedExpense(e.id)}>🗑️</button></td>
                </tr>
              ))}</tbody>
            </table></div>
          )}
        </div>
      </div>

      {/* Edit modal */}
      {editTx && (
        <div className="modal-overlay" onClick={()=>setEditTx(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:480}}>
            <div className="modal-hdr">
              <span className="modal-title">✏️ עריכת רשומה</span>
              <button className="modal-close" onClick={()=>setEditTx(null)}>✕</button>
            </div>
            <form onSubmit={handleEditSave}>
              <div className="modal-body" style={{display:'flex',flexDirection:'column',gap:14}}>
                <div className="fgroup">
                  <label className="flbl">סוג</label>
                  <select className="fsel" value={editForm.type} onChange={e=>setEF('type',e.target.value)}>
                    <option value="income">💰 הכנסה</option>
                    <option value="expense">💸 הוצאה</option>
                  </select>
                </div>
                <div className="fgroup">
                  <label className="flbl">תיאור</label>
                  <input className="finp" type="text" value={editForm.description} onChange={e=>setEF('description',e.target.value)} required/>
                </div>
                <div className="fgroup">
                  <label className="flbl">סכום (₪)</label>
                  <input className="finp" type="number" min="0" value={editForm.amount} onChange={e=>setEF('amount',e.target.value)} required dir="ltr" style={{textAlign:'right'}}/>
                </div>
                <div className="fgroup">
                  <label className="flbl">מי</label>
                  <select className="fsel" value={editForm.who} onChange={e=>setEF('who',e.target.value)}>
                    {TEAM.map(t=><option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
                <div className="fgroup">
                  <label className="flbl">תאריך</label>
                  <input className="finp" type="date" value={editForm.date||''} onChange={e=>setEF('date',e.target.value)}/>
                </div>
              </div>
              <div className="modal-foot">
                <button type="submit" className="btn btn-violet">שמור</button>
                <button type="button" className="btn btn-outline" onClick={()=>setEditTx(null)}>ביטול</button>
              </div>
            </form>
          </div>
        </div>
      )}
      {/* ── פילטרים ── */}
      <div className="card" style={{padding:'12px 16px'}}>
        <div style={{display:'flex',flexWrap:'wrap',gap:10,alignItems:'center'}}>
          <span style={{fontSize:13,fontWeight:700,color:'var(--gray-600)'}}>סינון:</span>

          {/* סוג */}
          <div style={{display:'flex',borderRadius:8,overflow:'hidden',border:'1px solid var(--gray-200)'}}>
            {[['all','הכל'],['income','💰 הכנסות'],['expense','💸 הוצאות']].map(([v,lbl])=>(
              <button key={v} onClick={()=>setTxType(v)} style={{padding:'5px 12px',fontSize:12,fontWeight:txType===v?700:400,background:txType===v?(v==='income'?'var(--green)':v==='expense'?'var(--red)':'var(--primary)'):'#fff',color:txType===v?'#fff':'var(--gray-600)',border:'none',cursor:'pointer',borderLeft:'1px solid var(--gray-200)'}}>
                {lbl}
              </button>
            ))}
          </div>

          <div className="f-div"/>

          {/* חשבון */}
          <div style={{display:'flex',borderRadius:8,overflow:'hidden',border:'1px solid var(--gray-200)'}}>
            {[['all','הכל'],['בוזבאגס','🍹 בוזבאגס'],['מלאכי','מלאכי'],['יותם','יותם']].map(([v,lbl])=>(
              <button key={v} onClick={()=>setTxWho(v)} style={{padding:'5px 11px',fontSize:12,fontWeight:txWho===v?700:400,background:txWho===v?(v==='בוזבאגס'?'#4f46e5':v==='מלאכי'?'#db2777':'#2563eb'):'#fff',color:txWho===v?'#fff':'var(--gray-600)',border:'none',cursor:'pointer',borderLeft:'1px solid var(--gray-200)'}}>
                {lbl}
              </button>
            ))}
          </div>

          <div className="f-div"/>

          {/* תקופה */}
          <div style={{display:'flex',borderRadius:8,overflow:'hidden',border:'1px solid var(--gray-200)'}}>
            {[['all','הכל'],['7','7י׳'],['30','30י׳'],['90','3ח׳'],['custom','טווח']].map(([v,lbl])=>(
              <button key={v} onClick={()=>setTxPeriod(v)} style={{padding:'5px 10px',fontSize:12,fontWeight:txPeriod===v?700:400,background:txPeriod===v?'var(--primary)':'#fff',color:txPeriod===v?'#fff':'var(--gray-600)',border:'none',cursor:'pointer',borderLeft:'1px solid var(--gray-200)'}}>
                {lbl}
              </button>
            ))}
          </div>

          {txPeriod==='custom' && (
            <>
              <label style={{fontSize:12,color:'var(--gray-500)',display:'flex',alignItems:'center',gap:4}}>
                מ: <input type="date" value={txFrom} onChange={e=>setTxFrom(e.target.value)} style={{fontSize:12,padding:'3px 6px',borderRadius:6,border:'1px solid var(--gray-300)',fontFamily:'inherit'}}/>
              </label>
              <label style={{fontSize:12,color:'var(--gray-500)',display:'flex',alignItems:'center',gap:4}}>
                עד: <input type="date" value={txTo} onChange={e=>setTxTo(e.target.value)} style={{fontSize:12,padding:'3px 6px',borderRadius:6,border:'1px solid var(--gray-300)',fontFamily:'inherit'}}/>
              </label>
            </>
          )}

          <div className="f-div"/>

          {/* מיון */}
          <select value={txSort} onChange={e=>setTxSort(e.target.value)} style={{fontSize:12,padding:'5px 8px',borderRadius:8,border:'1px solid var(--gray-200)',background:'#fff',color:'var(--gray-600)'}}>
            <option value="date_desc">תאריך: חדש → ישן</option>
            <option value="date_asc">תאריך: ישן → חדש</option>
            <option value="amount_desc">סכום: גדול → קטן</option>
            <option value="amount_asc">סכום: קטן → גדול</option>
          </select>

          <span style={{fontSize:12,color:'var(--gray-400)',marginRight:'auto'}}>{filteredSorted.length} רשומות{hasFilter&&transactions.length!==filteredSorted.length?` (מתוך ${transactions.length})`:''}</span>
          {hasFilter && <button onClick={()=>{setTxType('all');setTxWho('all');setTxPeriod('all');setTxFrom('');setTxTo('');}} style={{fontSize:11,padding:'4px 10px',borderRadius:6,border:'1px solid var(--gray-300)',background:'var(--gray-100)',cursor:'pointer',color:'var(--gray-600)'}}>✕ נקה</button>}
        </div>
      </div>

      {/* Summary cards */}
      <div className="stats-grid">
        <div className="stat-card"><div className="stat-icon si-green">💰</div><div><div className="stat-val" style={{color:'var(--green)'}}>{fmt(totals.income)}</div><div className="stat-lbl">{hasFilter?`הכנסות — ${periodLabel}`:'סה״כ הכנסות'}</div></div></div>
        <div className="stat-card"><div className="stat-icon si-red">💸</div><div><div className="stat-val" style={{color:'var(--red)'}}>{fmt(totals.expense)}</div><div className="stat-lbl">{hasFilter?`הוצאות — ${periodLabel}`:'סה״כ הוצאות'}</div></div></div>
        <div className="stat-card"><div className="stat-icon si-cyan">📊</div><div><div className="stat-val" style={{color:totals.net>=0?'var(--green)':'var(--red)'}}>{fmt(totals.net)}</div><div className="stat-lbl">מאזן{hasFilter?` — ${periodLabel}`:' כולל'}</div></div></div>
        <div className="stat-card"><div className="stat-icon si-violet">🧾</div><div><div className="stat-val">{filteredSorted.length}</div><div className="stat-lbl">{hasFilter?'רשומות בסינון':'סה״כ רשומות'}</div></div></div>
      </div>

      {/* Per-account summary */}
      {/* בוזבאגס — כרטיס ראשי גדול */}
      {(()=>{const d=totals.perPerson['בוזבאגס']||{income:0,expense:0};return(
        <div className="lb-card" style={{borderTop:'5px solid #4f46e5',background:'linear-gradient(135deg,#fafafa 0%,#f0f0ff 100%)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
            <span style={{fontSize:22}}>🍹</span>
            <div>
              <div style={{fontSize:20,fontWeight:900,color:'#4f46e5'}}>בוזבאגס</div>
              <div style={{fontSize:12,color:'var(--gray-400)'}}>החשבון הראשי</div>
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:16}}>
            <div style={{background:'#fff',borderRadius:10,padding:'12px 16px',boxShadow:'0 1px 4px rgba(0,0,0,.07)'}}>
              <div style={{fontSize:11,color:'var(--gray-400)',fontWeight:700,marginBottom:6}}>הכנסות</div>
              <div style={{fontSize:22,fontWeight:900,color:'var(--green)'}}>{fmt(d.income)}</div>
            </div>
            <div style={{background:'#fff',borderRadius:10,padding:'12px 16px',boxShadow:'0 1px 4px rgba(0,0,0,.07)'}}>
              <div style={{fontSize:11,color:'var(--gray-400)',fontWeight:700,marginBottom:6}}>הוצאות</div>
              <div style={{fontSize:22,fontWeight:900,color:'var(--red)'}}>{fmt(d.expense)}</div>
            </div>
            <div style={{background:'#fff',borderRadius:10,padding:'12px 16px',boxShadow:'0 1px 4px rgba(0,0,0,.07)'}}>

// מחזיר data URL (base64) — נשמר ישירות ב-Firebase RTDB, ללא Storage
function compressImage(file, maxW=900, quality=0.72) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const ratio = Math.min(1, maxW / img.width, maxW / img.height);
      const canvas = document.createElement('canvas');
      canvas.width  = Math.round(img.width  * ratio);
      canvas.height = Math.round(img.height * ratio);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = reject;
    img.src = url;
  });
}
function sanitizeFilename(s) { return (s||'').replace(/[/\\?%*:|"<>\s]/g,'_'); }
function dataUrlToBase64(dataUrl) { return dataUrl.split(',')[1] || ''; }

// Lightbox — פותח תמונה בתצוגה מלאה (עובד עם data URL)
function openImage(src) {
  const ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;z-index:10000;cursor:zoom-out';
  const img = document.createElement('img');
  img.src = src;
  img.style.cssText = 'max-width:92vw;max-height:92vh;object-fit:contain;border-radius:10px;box-shadow:0 8px 40px rgba(0,0,0,.6)';
  const x = document.createElement('div');
  x.textContent = '✕';
  x.style.cssText = 'position:absolute;top:18px;right:22px;color:#fff;font-size:30px;cursor:pointer;line-height:1;user-select:none';
  const rm = () => ov.remove();
  ov.onclick = rm; img.onclick = e => e.stopPropagation(); x.onclick = rm;
  ov.appendChild(img); ov.appendChild(x);
  document.body.appendChild(ov);
}

function BagModal({bag, bagIdx, orderId, orders, onSave, onClose}) {
  const isEdit = !!bag;

    bagNum: bag.bagNum||1,
    phraseA: bag.phraseA||'',
    imageNumA: bag.imageNumA||'',
    namesB: bag.namesB||'',
    cocktailB: bag.cocktailB||'',
    quantity: bag.quantity||100,
    needsDate: !!bag.needsDate,
  } : {
    orderId: orderId||'',
    bagNum: 1, phraseA: '', imageNumA: '', namesB: '', cocktailB: '', quantity: 100, needsDate: false,
  });
  const set = (k,v) => setF(p=>({...p,[k]:v}));

  const [imageUrl, setImageUrl]   = useState(isEdit ? (bag.imageUrl||'') : '');
  const [uploading, setUploading] = useState(false);
  const [uploadPct, setUploadPct] = useState(0);

function BagsView({orders, onUpdateBag, onAddBag}) {
  const [filter,      setFilter]      = useState('');
  const [filterFrom,  setFilterFrom]  = useState('');
  const [filterTo,    setFilterTo]    = useState('');
  const [showModal,   setShowModal]   = useState(false);
  const [editingBag,  setEditingBag]  = useState(null);
  const [exporting,   setExporting]   = useState(false);

  const allBags = useMemo(() => {
    const result = [];
    orders.forEach(order => {
      const bags = order.bags ? (Array.isArray(order.bags) ? order.bags : Object.values(order.bags)) : [];
      bags.forEach((bag, idx) => result.push({...bag, customerName:order.customerName, eventDate:order.eventDate, orderId:order.id, _bagIdx:idx}));
    });
    return result;
  }, [orders]);

  // שקיות מסוננות לפי טווח תאריכים
  const dateFilteredBags = useMemo(() => {
    if (!filterFrom && !filterTo) return allBags;
    return allBags.filter(b => {
      if (!b.eventDate) return false;
      if (filterFrom && b.eventDate < filterFrom) return false;
      if (filterTo   && b.eventDate > filterTo)   return false;
      return true;
    });
  }, [allBags, filterFrom, filterTo]);

  // סינון נוסף לפי לקוח
  const filtered = filter ? dateFilteredBags.filter(b=>b.customerName?.includes(filter)) : dateFilteredBags;

  // סיכום קוקטיילים — מבוסס על dateFilteredBags, תמיד כולל את כל 7 הקוקטיילים
  const cocktailStats = useMemo(() => {
    const stats = {};
    // אתחול עם 0 לכל קוקטייל
    COCKTAIL_TYPES.forEach(c => { stats[c] = {count:0, bags:0}; });
    dateFilteredBags.forEach(bag => {
      const key = normalizeCocktail(bag.cocktailB);
      if (!key) return;
      if (!stats[key]) stats[key] = {count:0, bags:0};
      stats[key].count++;
      stats[key].bags += Number(bag.quantity)||0;
    });
    return Object.entries(stats).sort((a,b)=>b[1].bags-a[1].bags);
  }, [dateFilteredBags]);

  const customers = useMemo(()=>[...new Set(dateFilteredBags.map(b=>b.customerName).filter(Boolean))],[dateFilteredBags]);

  const exportToFactory = async () => {
    setExporting(true);
    try {
      const today = new Date().toISOString().slice(0,10);
      const fmtD = d => d ? new Date(d).toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'}) : '';

      // מיין: תאריך אירוע → לקוח → שקית (מסונן לפי טווח תאריכים)
      const rows = [...dateFilteredBags].sort((a,b)=>{
        const dc=(a.eventDate||'').localeCompare(b.eventDate||''); if(dc) return dc;
        const nc=(a.customerName||'').localeCompare(b.customerName||''); if(nc) return nc;
        return (Number(a.bagNum)||0)-(Number(b.bagNum)||0);
      });

      // ── ZIP: חלץ תמונות לתיקייה ──
      const zip = new JSZip();
      const imgFolder = zip.folder('תמונות');

      // תמונות גב לפי הזמנה
      const backImgNames = {};
      orders.forEach(ord => {
        if (ord.backImage && ord.backImage.startsWith('data:')) {
          const ext = ord.backImage.includes('image/png') ? 'png' : 'jpg';
          const safe = (ord.customerName||ord.id).replace(/[^א-תa-zA-Z0-9\-]/g,'_');
          const name = `גב_${safe}.${ext}`;
          imgFolder.file(name, ord.backImage.split(',')[1], {base64:true});
          backImgNames[ord.id] = name;
        }
      });

      // תמונות שקיות
      const rowsWithImg = rows.map(b => {
        let imgName = '';
        if (b.imageUrl && b.imageUrl.startsWith('data:')) {
          const ext = b.imageUrl.includes('image/png') ? 'png' : 'jpg';
          const safe = (b.customerName||'').replace(/[^א-תa-zA-Z0-9\-]/g,'_');
          imgName = `${safe}_שקית${b.bagNum||''}.${ext}`;
          imgFolder.file(imgName, b.imageUrl.split(',')[1], {base64:true});
        }
        return {...b, _imgName: imgName};
      });

      // ── Excel ──
      const headers = ['לקוח','תאריך אירוע','שקית #','תמונה','צד א — מלל','מספר תמונה','צד ב — שמות','קוקטייל','צריך תאריך?','כמות'];
      const data = [headers, ...rowsWithImg.map(b=>[
        b.customerName||'', fmtD(b.eventDate), b.bagNum||'',
        b._imgName ? `תמונות/${b._imgName}` : '',
        b.phraseA||'', b.imageNumA||'', b.namesB||'', normalizeCocktail(b.cocktailB),
        b.needsDate?'כן':'לא', Number(b.quantity)||0,
      ])];
      const ws = XLSX.utils.aoa_to_sheet(data);
      ws['!cols'] = [{wch:20},{wch:14},{wch:8},{wch:30},{wch:32},{wch:12},{wch:32},{wch:18},{wch:12},{wch:8}];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'שקיות למפעל');
      const xlsBuf = XLSX.write(wb, {bookType:'xlsx', type:'array'});
      zip.file(`שקיות-למפעל-${today}.xlsx`, xlsBuf);

      // ── HTML ויזואלי — תמונות ב-relative path לתיקיית תמונות ──
      const orderMap = {};
      rowsWithImg.forEach(b=>{
        if (!orderMap[b.orderId]) {
          orderMap[b.orderId] = {customerName:b.customerName, eventDate:b.eventDate, backImgName:backImgNames[b.orderId]||'', bags:[]};
        }
        orderMap[b.orderId].bags.push(b);
      });

      const bagCard = (b) => {
        const src = b._imgName ? `תמונות/${b._imgName}` : '';
        return `
        <div class="bag-card">
          <div class="bag-head">שקית #${b.bagNum||''}  ·  ${Number(b.quantity)||0} יחידות${b.needsDate?' · 📅 צריך תאריך':''}</div>
          <div class="bag-body">
            ${src ? `<div class="bag-img-wrap"><img src="${src}" class="bag-img" onclick="openLb(this.src)" title="לחץ להגדלה"/><div class="img-lbl">לחץ להגדלה 🔍</div></div>` : '<div class="bag-img-wrap no-img">אין תמונה</div>'}
            <div class="bag-details">
              ${b.phraseA   ? `<div class="det"><span class="det-lbl">📝 צד א — מלל</span><span class="det-val">${b.phraseA}</span></div>` : ''}
              ${b.imageNumA ? `<div class="det"><span class="det-lbl">🔢 מספר תמונה</span><span class="det-val">${b.imageNumA}</span></div>` : ''}
              ${b.namesB    ? `<div class="det"><span class="det-lbl">👥 צד ב — שמות</span><span class="det-val">${b.namesB}</span></div>` : ''}
              ${b.cocktailB ? `<div class="det"><span class="det-lbl">🍸 קוקטייל</span><span class="det-val">${normalizeCocktail(b.cocktailB)}</span></div>` : ''}
            </div>
          </div>
        </div>`;
      };

      const orderBlock = (grp) => {
        const backSrc = grp.backImgName ? `תמונות/${grp.backImgName}` : '';
        return `

${Object.values(orderMap).map(orderBlock).join('')}

      zip.file(`סיכום-למפעל-${today}.html`, html);

      // ── הורד ZIP ──
      const zipBlob = await zip.generateAsync({type:'blob', compression:'DEFLATE', compressionOptions:{level:6}});
