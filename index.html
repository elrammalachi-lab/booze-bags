                    <div key={idx} style={{background:'var(--gray-50)',border:'1px solid var(--gray-200)',borderRadius:10,padding:'12px 14px'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                        <div style={{fontWeight:700,fontSize:13,color:'var(--primary)'}}>שקית #{bag.bagNum}</div>
                        <button type="button" className="btn-del" onClick={()=>set('bags',(f.bags||[]).filter((_,i)=>i!==idx))}>🗑️</button>
                      </div>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                        <div className="fgroup" style={{marginBottom:0}}><label className="flbl" style={{fontSize:11}}>צד א — מלל</label><input className="finp" type="text" value={bag.phraseA||''} onChange={e=>{const b=[...f.bags];b[idx]={...b[idx],phraseA:e.target.value};set('bags',b);}} placeholder="המשפט על השקית"/></div>
                        <div className="fgroup" style={{marginBottom:0}}><label className="flbl" style={{fontSize:11}}>מספר תמונה</label><input className="finp" type="text" value={bag.imageNumA||''} onChange={e=>{const b=[...f.bags];b[idx]={...b[idx],imageNumA:e.target.value};set('bags',b);}} placeholder="1"/></div>
                        <div className="fgroup" style={{marginBottom:0}}><label className="flbl" style={{fontSize:11}}>צד ב — שמות</label><input className="finp" type="text" value={bag.namesB||''} onChange={e=>{const b=[...f.bags];b[idx]={...b[idx],namesB:e.target.value};set('bags',b);}} placeholder="שמות הזוג"/></div>
                        <div className="fgroup" style={{marginBottom:0}}><label className="flbl" style={{fontSize:11}}>קוקטייל</label>
                          <select className="fsel" value={bag.cocktailB||''} onChange={e=>{const b=[...f.bags];b[idx]={...b[idx],cocktailB:e.target.value};set('bags',b);}}>
                            <option value="">— ללא —</option>
                            {COCKTAIL_TYPES.map(c=>{const ci=COCKTAIL_TYPES.indexOf(c);return <option key={c} value={c}>{c}</option>;})}
                          </select>
                        </div>
                        <div className="fgroup" style={{marginBottom:0}}><label className="flbl" style={{fontSize:11}}>כמות להדפסה</label><input className="finp" type="number" min="0" value={bag.quantity||100} onChange={e=>{const b=[...f.bags];b[idx]={...b[idx],quantity:Number(e.target.value)};set('bags',b);}} dir="ltr" style={{textAlign:'right'}}/></div>
                        <div className="fgroup" style={{marginBottom:0}}><label className="flbl" style={{fontSize:11}}>צריך תאריך?</label>
                          <button type="button" className={`pay-btn ${bag.needsDate?'pay-yes':'pay-no'}`} style={{width:'100%',justifyContent:'center',padding:'7px'}} onClick={()=>{const b=[...f.bags];b[idx]={...b[idx],needsDate:!bag.needsDate};set('bags',b);}}>
                            {bag.needsDate?'✅ כן — יש תאריך':'❌ לא — ללא תאריך'}
                          </button>
                        </div>
                      </div>

                      {/* ── תמונת לקוח ── */}
                      <div style={{marginTop:10,paddingTop:10,borderTop:'1px dashed var(--gray-200)'}}>
                        <input type="file" accept="image/*" id={`bag-img-${idx}`} style={{display:'none'}} onChange={e=>handleBagImageUpload(idx,e)}/>
                        <label className="flbl" style={{fontSize:11,marginBottom:6,display:'block'}}>📎 תמונת לקוח</label>
                        {bag.imageUrl ? (
                          <div style={{display:'flex',alignItems:'center',gap:10}}>
                            <img src={bag.imageUrl} alt="" style={{width:64,height:64,objectFit:'cover',borderRadius:8,border:'2px solid var(--gray-200)',cursor:'pointer'}} onClick={()=>openImage(bag.imageUrl)} title="לחץ לצפייה מלאה"/>
                            <div style={{display:'flex',flexDirection:'column',gap:5}}>
                              <button type="button" className="btn btn-outline btn-sm" style={{fontSize:11}} onClick={()=>document.getElementById(`bag-img-${idx}`)?.click()}>🔄 החלף</button>
                              <button type="button" className="btn btn-sm" style={{fontSize:11,background:'var(--red)',color:'#fff',border:'none'}} onClick={()=>{const b=[...f.bags];b[idx]={...b[idx],imageUrl:''};set('bags',b);}}>🗑️ הסר</button>
                            </div>
                          </div>
                        ) : bagUpload[idx]?.uploading ? (
                          <div style={{fontSize:12,color:'var(--gray-500)'}}>
                            ⏫ מעלה… {bagUpload[idx].pct}%
                            <div style={{height:3,background:'var(--gray-200)',borderRadius:3,marginTop:4,overflow:'hidden'}}>
                              <div style={{height:'100%',width:`${bagUpload[idx].pct}%`,background:'var(--violet)',transition:'width .3s'}}/>
                            </div>
                          </div>
                        ) : (
                          <button type="button" className="btn btn-outline btn-sm" style={{fontSize:11,color:'var(--gray-500)',borderStyle:'dashed'}} onClick={()=>document.getElementById(`bag-img-${idx}`)?.click()}>
                            🖼️ הוסף תמונת לקוח
                          </button>
                        )}
                      </div>
                    </div>
                  ))}
                  <button type="button" className="btn btn-outline btn-sm" style={{alignSelf:'flex-start'}}
                    onClick={()=>set('bags',[...(f.bags||[]),{...BAG_EMPTY,bagNum:((f.bags||[]).length+1)}])}>
                    + הוסף שקית
                  </button>
                </div>
              </div>
            </div>
            <div className="calc">
              <div className="ci"><span className="ci-lbl">מחיר חבילה</span><span className="ci-val" style={{color:'var(--gray-700)',fontSize:17}}>{fmt(f.packagePrice)}</span></div>
              <span className="ci-op">+</span>
              <div className="ci"><span className="ci-lbl">תוספות</span><span className="ci-val" style={{color:'var(--gray-700)',fontSize:17}}>{fmt(f.extras)}</span></div>
              <span className="ci-op">=</span>
              <div className="ci"><span className="ci-lbl">הכנסה</span><span className="ci-val ci-rev">{fmt(rev)}</span></div>
              <span className="ci-op">−</span>
              <div className="ci"><span className="ci-lbl">עלות ייצור<br/><span style={{fontSize:10,fontWeight:400,color:'var(--gray-400)'}}>({f.bagCount}×₪{BAG_COST_PER_UNIT})</span></span><span className="ci-val ci-cost">-{fmt(cost)}</span></div>
              <span className="ci-op">=</span>
              <div className="ci"><span className="ci-lbl">רווח גולמי</span><span className={`ci-val ${prof>=0?'ci-prof':'ci-loss'}`}>{fmt(prof)}</span></div>
            </div>
          </div>
          <div className="modal-ftr">
            <button type="submit" className="btn btn-violet">{order?'💾  שמור שינויים':'✅  הוסף הזמנה'}</button>
            <button type="button" className="btn btn-outline" onClick={onClose}>ביטול</button>
          </div>
        </form>
      </div>
    </div>
  );
}

// ── Monthly Stats ──
function MonthlyStats({orders, transactions, settings, onUpdateSettings, monthlyExpenses, onAddMonthlyExpense, onDeleteMonthlyExpense, monthlySettings, onUpdateMonthlySetting, onAddCostItem, onDeleteCostItem, fixedExpenses}) {
  const [addingFor, setAddingFor] = useState(null); // ym string
  const [newExpLabel, setNewExpLabel] = useState('');
  const [newExpAmount, setNewExpAmount] = useState('');
  const [addingCostFor, setAddingCostFor] = useState(null); // ym string for cost breakdown
  const [newCostLabel, setNewCostLabel] = useState('');
  const [newCostAmount, setNewCostAmount] = useState('');
  const handleAddCostItem = (ym) => {
    if(!newCostLabel.trim()||!newCostAmount) return;
    onAddCostItem(ym, {label:newCostLabel.trim(), amount:Number(newCostAmount)||0});
    setNewCostLabel(''); setNewCostAmount(''); setAddingCostFor(null);
  };

  const monthly = useMemo(()=>{
    const m={};
    orders.forEach(o=>{
      if(!o.eventDate)return;
      const ym=o.eventDate.substring(0,7);
      if(!m[ym])m[ym]={ym,orders:[],rev:0,prof:0,bags:0,cost:0};
      m[ym].orders.push(o); m[ym].rev+=revenue(o); m[ym].prof+=profit(o);
      m[ym].bags+=Number(o.bagCount)||0; m[ym].cost+=bagCost(o);
    });
    return Object.values(m).sort((a,b)=>b.ym.localeCompare(a.ym));
  },[orders]);

  const getLabel = (ym)=>{const[y,mo]=ym.split('-');return`${MONTH_NAMES[parseInt(mo)-1]} ${y}`;};

  // הוצאות מטאב הוצאות/הכנסות לפי חודש
  const txExpensesByMonth = useMemo(()=>{
    const m={};
    transactions.filter(t=>t.type==='expense'&&t.date).forEach(t=>{
      const ym=t.date.substring(0,7);
      if(!m[ym])m[ym]=[];
      m[ym].push(t);
    });
    return m;
  },[transactions]);

  const handleAddExpense = (ym) => {
    if(!newExpLabel.trim()||!newExpAmount) return;
    onAddMonthlyExpense(ym, {label:newExpLabel.trim(), amount:Number(newExpAmount)||0, createdAt:new Date().toISOString()});
    setNewExpLabel(''); setNewExpAmount(''); setAddingFor(null);
  };

  if(monthly.length===0) return <div className="card"><div className="empty"><div className="empty-icon">📅</div><p className="empty-txt">אין נתונים לסיכום חודשי</p></div></div>;

  return (
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <h2 className="section-title">פירוט לפי חודשים</h2>
      {monthly.map(m=>{
        // הגדרות חודשיות (עלות לשקית + שיווק)
        const ms = monthlySettings[m.ym] || {};
        const costPerBag = ms.costPerBag !== undefined ? Number(ms.costPerBag) : BAG_COST_PER_UNIT;
        const monthMarketing = ms.marketing !== undefined ? Number(ms.marketing) : 0;
        // פירוט עלות ייצור
        const breakdownRaw = ms.costBreakdown || {};
        const breakdownList = Object.entries(breakdownRaw).map(([id,e])=>({...e,id}));
        const breakdownTotal = breakdownList.reduce((a,e)=>a+(Number(e.amount)||0),0);
        const prodCost = breakdownList.length > 0 ? breakdownTotal : m.bags * costPerBag;
        const effectiveCostPerBag = m.bags > 0 ? prodCost / m.bags : 0;
        // הוצאות ידניות לחודש זה
        const meRaw = monthlyExpenses[m.ym] || {};
        const meList = Object.entries(meRaw).map(([id,e])=>({...e,id}));
        const meTotal = meList.reduce((a,e)=>a+(Number(e.amount)||0),0);
        // הוצאות מהטאב
        const txExp = txExpensesByMonth[m.ym] || [];
        const txTotal = txExp.reduce((a,t)=>a+(Number(t.amount)||0),0);
        // הוצאות קבועות חוזרות
        const feArr = fixedExpenses || [];
        const recurringFixed = feArr.filter(e=>e.isRecurring&&e.startMonth<=m.ym&&(!e.endMonth||e.endMonth>=m.ym)).reduce((s,e)=>s+(Number(e.amount)||0),0);
        // הוצאות קבועות חד-פעמיות
        const onetimeFixed = feArr.filter(e=>!e.isRecurring&&e.month===m.ym).reduce((s,e)=>s+(Number(e.amount)||0),0);
        const totalFixed = recurringFixed + onetimeFixed;
        // סה״כ הוצאות ורווח נקי
        const totalExp = prodCost + monthMarketing + meTotal + totalFixed;
        const netProfit = m.rev - totalExp;
        const monthMargin = m.rev>0?Math.round(netProfit/m.rev*100):0;

        return (
          <div key={m.ym} className="card">
            {/* כותרת חודש */}
            <div className="month-hdr">
              <div>
                <div className="month-title">{getLabel(m.ym)}</div>
                <div className="month-sub">{m.orders.length} הזמנות · {m.bags.toLocaleString('he-IL')} שקיות · מרווח {monthMargin}%</div>
              </div>
              <div style={{textAlign:'left',direction:'ltr'}}>
                <div style={{fontSize:22,fontWeight:800,color:netProfit>=0?'var(--green)':'var(--red)'}}>{fmt(netProfit)}</div>
                <div style={{fontSize:11,opacity:.7}}>רווח נקי</div>
              </div>
            </div>

            {/* הגדרות חודשיות — עלות ייצור (פירוט) + שיווק */}
            <div style={{padding:'12px 20px',background:'var(--gray-50)',borderBottom:'1px solid var(--gray-100)'}}>
              {/* עלות ייצור - breakdown */}
              <div style={{marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:breakdownList.length>0?6:0}}>
                  <span style={{fontSize:13,fontWeight:600,color:'var(--gray-600)'}}>🛍️ עלות ייצור (פירוט):</span>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    {prodCost>0 && <span style={{fontSize:12,color:'var(--red)',fontWeight:700}}>סה״כ: -{fmt(prodCost)}{m.bags>0?` · ₪${effectiveCostPerBag.toFixed(1)}/שקית`:''}</span>}
                    <button className="btn btn-outline btn-sm" style={{fontSize:11,padding:'3px 10px'}} onClick={()=>setAddingCostFor(p=>p===m.ym?null:m.ym)}>+ הוסף</button>
                  </div>
                </div>
                {breakdownList.map(item=>(
                  <div key={item.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:13,padding:'3px 0'}}>
                    <span style={{color:'var(--gray-700)'}}>• {item.label}</span>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <span style={{color:'var(--red)',fontWeight:600}}>-{fmt(item.amount)}</span>
                      <button className="btn-del" style={{padding:'2px 6px',fontSize:11}} onClick={()=>onDeleteCostItem(m.ym,item.id)}>🗑️</button>
                    </div>
                  </div>
                ))}
                {addingCostFor===m.ym && (
                  <div style={{display:'flex',gap:8,marginTop:6,alignItems:'center',flexWrap:'wrap'}}>
                    <input className="finp" placeholder="קטגוריה (מפעל, קוקטייל...)" value={newCostLabel} onChange={e=>setNewCostLabel(e.target.value)} style={{flex:2,minWidth:120,fontSize:13,padding:'6px 10px'}}/>
                    <input className="finp" type="number" placeholder="סכום ₪" value={newCostAmount} onChange={e=>setNewCostAmount(e.target.value)} style={{flex:1,minWidth:80,fontSize:13,padding:'6px 10px'}} dir="ltr"/>
                    <button className="btn btn-violet btn-sm" onClick={()=>handleAddCostItem(m.ym)}>הוסף</button>
                    <button className="btn btn-outline btn-sm" onClick={()=>{setAddingCostFor(null);setNewCostLabel('');setNewCostAmount('');}}>ביטול</button>
                  </div>
                )}
                {breakdownList.length===0 && addingCostFor!==m.ym && (
                  <div style={{fontSize:12,color:'var(--gray-400)',marginTop:2}}>לחץ "+ הוסף" לפירוט עלות ייצור לפי קטגוריות</div>
                )}
              </div>
              {/* שיווק */}
              <div style={{display:'flex',alignItems:'center',gap:8,paddingTop:8,borderTop:'1px solid var(--gray-200)'}}>
                <span style={{fontSize:13,fontWeight:600,color:'var(--gray-600)'}}>📣 שיווק:</span>
                <span style={{fontSize:12,color:'var(--gray-400)'}}>₪</span>
                <input
                  type="number" min="0" step="100"
                  value={monthMarketing}
                  onChange={e=>onUpdateMonthlySetting(m.ym,'marketing',Number(e.target.value)||0)}
                  style={{width:80,padding:'4px 8px',border:'1.5px solid var(--gray-200)',borderRadius:6,fontSize:13,textAlign:'right',fontFamily:'inherit'}}
                  dir="ltr"
                />
              </div>
            </div>

            {/* מיני סטטס */}
            <div className="mini-stats">
              <div className="mini-item"><div className="mini-lbl">💰 הכנסות</div><div className="mini-val v-cyan">{fmt(m.rev)}</div></div>
              <div className="mini-item"><div className="mini-lbl">🏭 עלות ייצור</div><div className="mini-val v-red">-{fmt(prodCost)}</div></div>
              <div className="mini-item"><div className="mini-lbl">📋 שיווק + הוצאות</div><div className="mini-val v-red">{monthMarketing+meTotal>0?`-${fmt(monthMarketing+meTotal)}`:'—'}</div></div>
              {recurringFixed>0 && <div className="mini-item"><div className="mini-lbl">🔄 הוצאות חוזרות</div><div className="mini-val v-red">-{fmt(recurringFixed)}</div></div>}
              {onetimeFixed>0  && <div className="mini-item"><div className="mini-lbl">1️⃣ הד-פעמיות</div><div className="mini-val v-red">-{fmt(onetimeFixed)}</div></div>}
              <div className="mini-item"><div className="mini-lbl">🏆 רווח נקי</div><div className="mini-val" style={{color:netProfit>=0?'var(--green)':'var(--red)',fontWeight:800}}>{fmt(netProfit)}</div></div>
            </div>

            {/* פירוט הוצאות */}
            <div style={{padding:'10px 20px',borderTop:'1px solid var(--gray-100)',display:'flex',flexDirection:'column',gap:4}}>
              <div style={{fontSize:12,fontWeight:700,color:'var(--gray-400)',marginBottom:4}}>פירוט הוצאות החודש</div>
              {breakdownList.length>0 ? breakdownList.map(item=>(
                <div key={item.id} style={{display:'flex',justifyContent:'space-between',fontSize:13}}><span style={{color:'var(--gray-600)'}}>🏭 {item.label}</span><span style={{color:'var(--red)',fontWeight:600}}>-{fmt(item.amount)}</span></div>
              )) : (
                <div style={{display:'flex',justifyContent:'space-between',fontSize:13}}><span style={{color:'var(--gray-600)'}}>🏭 עלות ייצור ({m.bags} שקיות × ₪{costPerBag})</span><span style={{color:'var(--red)',fontWeight:600}}>-{fmt(prodCost)}</span></div>
              )}
              {monthMarketing>0 && <div style={{display:'flex',justifyContent:'space-between',fontSize:13}}><span style={{color:'var(--gray-600)'}}>📣 שיווק</span><span style={{color:'var(--red)',fontWeight:600}}>-{fmt(monthMarketing)}</span></div>}
              {meList.map(e=>(
                <div key={e.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:13}}>
                  <span style={{color:'var(--gray-600)'}}>📌 {e.label}</span>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{color:'var(--red)',fontWeight:600}}>-{fmt(e.amount)}</span>
                    <button className="btn-del" style={{padding:'2px 6px',fontSize:11}} onClick={()=>onDeleteMonthlyExpense(m.ym,e.id)}>🗑️</button>
                  </div>
                </div>
              ))}
              {/* הוספת הוצאה */}
              {addingFor===m.ym ? (
                <div style={{display:'flex',gap:8,marginTop:8,alignItems:'center',flexWrap:'wrap'}}>
                  <input className="finp" placeholder="תיאור הוצאה" value={newExpLabel} onChange={e=>setNewExpLabel(e.target.value)} style={{flex:2,minWidth:120,fontSize:13,padding:'6px 10px'}}/>
                  <input className="finp" type="number" placeholder="סכום ₪" value={newExpAmount} onChange={e=>setNewExpAmount(e.target.value)} style={{flex:1,minWidth:80,fontSize:13,padding:'6px 10px'}} dir="ltr"/>
                  <button className="btn btn-violet btn-sm" onClick={()=>handleAddExpense(m.ym)}>הוסף</button>
                  <button className="btn btn-outline btn-sm" onClick={()=>{setAddingFor(null);setNewExpLabel('');setNewExpAmount('');}}>ביטול</button>
                </div>
              ) : (
                <button className="btn btn-outline btn-sm" style={{alignSelf:'flex-start',marginTop:6,fontSize:12}} onClick={()=>setAddingFor(m.ym)}>+ הוסף הוצאה ידנית</button>
              )}
              {/* הוצאות קבועות חוזרות */}
              {recurringFixed>0 && (feArr.filter(e=>e.isRecurring&&e.startMonth<=m.ym&&(!e.endMonth||e.endMonth>=m.ym)).map(e=>(
                <div key={e.id} style={{display:'flex',justifyContent:'space-between',fontSize:13}}>
                  <span style={{color:'var(--gray-600)'}}>🔄 {e.name}{e.category?` (${e.category})`:''}</span>
                  <span style={{color:'var(--red)',fontWeight:600}}>-{fmt(e.amount)}</span>
                </div>
              )))}
              {/* הוצאות קבועות חד-פעמיות */}
              {onetimeFixed>0 && (feArr.filter(e=>!e.isRecurring&&e.month===m.ym).map(e=>(
                <div key={e.id} style={{display:'flex',justifyContent:'space-between',fontSize:13}}>
                  <span style={{color:'var(--gray-600)'}}>1️⃣ {e.name}{e.category?` (${e.category})`:''}</span>
                  <span style={{color:'var(--red)',fontWeight:600}}>-{fmt(e.amount)}</span>
                </div>
              )))}
              {/* שורת סיכום */}
              <div style={{display:'flex',justifyContent:'space-between',fontSize:14,fontWeight:800,marginTop:8,paddingTop:8,borderTop:'1px solid var(--gray-200)'}}>
                <span>סה״כ הוצאות</span>
                <span style={{color:'var(--red)'}}>-{fmt(totalExp)}</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:15,fontWeight:800,paddingTop:4}}>
                <span>🏆 רווח נקי</span>
                <span style={{color:netProfit>=0?'var(--green)':'var(--red)'}}>{fmt(netProfit)}</span>
              </div>
            </div>

            {/* טבלת הזמנות */}
            <div className="tbl-wrap"><table>
              <thead><tr><th>לקוח</th><th>סוג אירוע</th><th>שקיות</th><th>מחיר חבילה</th><th>תוספות</th><th>הכנסה</th><th>עלות ייצור</th><th>רווח גולמי</th><th>סגר</th><th>סטטוס</th></tr></thead>
              <tbody>{[...m.orders].sort((a,b)=>new Date(a.eventDate)-new Date(b.eventDate)).map(o=>{
                const rev=revenue(o);
                const oCost=(Number(o.bagCount)||0)*effectiveCostPerBag;
                const prof=rev-oCost;
                return(
                <tr key={o.id}>
                  <td className="td-b">{o.customerName}</td>
                  <td style={{color:'var(--gray-500)',fontSize:12}}>{o.eventType||'—'}</td>
                  <td className="td-c" style={{fontWeight:600}}>{o.bagCount}</td>
                  <td>{fmt(o.packagePrice)}</td>
                  <td style={{color:o.extras>0?'inherit':'var(--gray-400)'}}>{o.extras>0?fmt(o.extras):'—'}</td>
                  <td className="td-rev">{fmt(rev)}</td>
                  <td style={{color:'var(--red)',fontWeight:600}}>-{fmt(oCost)}</td>
                  <td className={prof>=0?'td-prof':'td-loss'}>{fmt(prof)}</td>
                  <td><TeamTag who={o.closedBy}/></td>
                  <td><Badge status={o.status}/></td>
                </tr>);})}</tbody>
              <tfoot><tr style={{background:'var(--gray-50)'}}>
                <td colSpan={5} style={{fontWeight:700,color:'var(--gray-600)',fontSize:12}}>סה״כ חודש</td>
                <td className="td-rev">{fmt(m.rev)}</td>
                <td style={{color:'var(--red)',fontWeight:600}}>-{fmt(prodCost)}</td>
                <td className={netProfit>=0?'td-prof':'td-loss'}>{fmt(m.rev-prodCost)}</td>
                <td/><td/>
              </tr></tfoot>
            </table></div>
          </div>
        );
      })}
    </div>
  );
}

// ── PIN Gate ──
const PIN = '2708';
function PinGate({onUnlock}) {
  const [pin, setPin] = useState('');
  const [error, setError] = useState(false);

  const handleDigit = (d) => {
    if (pin.length >= 4) return;
    const next = pin + d;
    setPin(next);
    setError(false);
    if (next.length === 4) {
      setTimeout(() => {
        if (next === PIN) {
          localStorage.setItem('bb_auth', Date.now().toString());
          onUnlock();
        } else {
          setError(true);
          setTimeout(() => { setPin(''); setError(false); }, 800);
        }
      }, 120);
    }
  };

  const btnStyle = {padding:'18px 0',fontSize:22,fontWeight:700,background:'#fff',border:'2px solid var(--gray-200)',borderRadius:12,cursor:'pointer',fontFamily:'inherit',transition:'background .12s,border-color .12s'};

  return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'var(--gray-50)'}}>
      <div className="card" style={{maxWidth:300,width:'100%',padding:'36px 28px',textAlign:'center'}}>
        <img src="logo.jpg" alt="Booze Bags" style={{width:160,marginBottom:16,borderRadius:12}}/>
        <div style={{fontSize:13,color:'var(--gray-500)',marginBottom:24}}>הזן קוד PIN</div>
        <div style={{display:'flex',justifyContent:'center',gap:14,marginBottom:24}}>
          {[0,1,2,3].map(i=>(
            <div key={i} style={{width:14,height:14,borderRadius:'50%',background: i<pin.length ? (error?'var(--red)':'var(--primary)') : 'var(--gray-200)',transition:'background .15s'}}/>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:10,direction:'ltr'}}>
          {[1,2,3,4,5,6,7,8,9].map(d=>(
            <button key={d} style={btnStyle} onClick={()=>handleDigit(String(d))}
              onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--primary)';e.currentTarget.style.background='#f5f3ff';}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--gray-200)';e.currentTarget.style.background='#fff';}}
            >{d}</button>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,direction:'ltr'}}>
          <div/>
          <button style={btnStyle} onClick={()=>handleDigit('0')}
            onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--primary)';e.currentTarget.style.background='#f5f3ff';}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--gray-200)';e.currentTarget.style.background='#fff';}}
          >0</button>
          <button onClick={()=>setPin(p=>p.slice(0,-1))} style={{...btnStyle,background:'transparent',border:'2px solid transparent',color:'var(--gray-400)',fontSize:20}}>⌫</button>
        </div>
        {error && <div style={{color:'var(--red)',fontSize:13,marginTop:16,fontWeight:600}}>❌ קוד שגוי</div>}
      </div>
    </div>
  );
}

// ── Main App ──
function App() {
  const [db] = useState(() => {
    try {
      if (!firebase.apps.length) firebase.initializeApp(window.FIREBASE_CONFIG);
      return firebase.database();
    } catch(e) { return null; }
  });
  const [orders, setOrders] = useState([]);
  const [transactions, setTransactions] = useState([]);
  const [calendarEvents, setCalendarEvents] = useState([]);
  const [reminders, setReminders] = useState([]);
  const [productionQueue, setProductionQueue] = useState({});
  const [approvalRequests, setApprovalRequests] = useState({});
  const [approvalEvents,   setApprovalEvents]   = useState({});
  const [showApproval,     setShowApproval]      = useState(false);
  const [approvalOrder,    setApprovalOrder]     = useState(null);
  const [deliveries, setDeliveries] = useState([]);
  const [monthlyExpenses, setMonthlyExpenses] = useState({});
  const [monthlySettings, setMonthlySettings] = useState({});
  const [fixedExpenses, setFixedExpenses] = useState([]);
  const [settings, setSettings] = useState({marketing: 2500, extraItems: [], monthlyFixed: 0, emailjs: {serviceId:'',templateId:'',publicKey:'',defaultEmail:'elram.malachi@gmail.com'}});
  const [loading, setLoading] = useState(false);
  const [unlocked, setUnlocked] = useState(() => !!localStorage.getItem('bb_auth'));
  const [connected, setConnected] = useState(false);
  const [tab, setTab] = useState('dashboard');
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [filters, setFilters] = useState({month:'',status:'',closedBy:'',dateFrom:'',dateTo:''});

  useEffect(() => {
    if (!db) return;
    setLoading(true);

    const connRef = db.ref('.info/connected');
    connRef.on('value', snap => setConnected(snap.val() === true));

    const ordersRef = db.ref('orders');
    ordersRef.on('value', snap => {
      const data = snap.val() || {};
      const arr = Object.entries(data).map(([id, o]) => ({...o, id}));
      arr.sort((a, b) => new Date(b.createdAt||0) - new Date(a.createdAt||0));
      setOrders(arr);
      setLoading(false);
    });

    const settingsRef = db.ref('settings');
    settingsRef.on('value', snap => {
      const data = snap.val();
      if (data) {
        setSettings({
          marketing: data.marketing !== undefined ? data.marketing : 2500,
          extraItems: data.extraItems ? Object.values(data.extraItems) : [],
          monthlyFixed: data.monthlyFixed !== undefined ? data.monthlyFixed : 0,
          emailjs: data.emailjs || {serviceId:'',templateId:'',publicKey:'',defaultEmail:'elram.malachi@gmail.com'},
        });
      }
    });

    const txRef = db.ref('transactions');
    txRef.on('value', snap => {
      const data = snap.val() || {};
      setTransactions(Object.entries(data).map(([id, t]) => ({...t, id})));
    });

    const calRef = db.ref('calendarEvents');
    calRef.on('value', snap => {
      const data = snap.val() || {};
      setCalendarEvents(Object.entries(data).map(([id, e]) => ({...e, id})));
    });

    const remRef = db.ref('reminders');
    remRef.on('value', snap => {
      const data = snap.val() || {};
      setReminders(Object.entries(data).map(([id, r]) => ({...r, id})));
    });

    const pqRef = db.ref('productionQueue');
    pqRef.on('value', snap => setProductionQueue(snap.val() || {}));

    const arRef = db.ref('approvals/requests');
    arRef.on('value', snap => setApprovalRequests(snap.val() || {}));
    const aeRef = db.ref('approvals/events');
    aeRef.on('value', snap => setApprovalEvents(snap.val() || {}));

    const delRef = db.ref('deliveries');
    delRef.on('value', snap => {
      const data = snap.val() || {};
      setDeliveries(Object.entries(data).map(([id, d]) => ({...d, id})));
    });

    const meRef = db.ref('monthlyExpenses');
    meRef.on('value', snap => setMonthlyExpenses(snap.val() || {}));

    const msRef = db.ref('monthlySettings');
    msRef.on('value', snap => setMonthlySettings(snap.val() || {}));

    const feRef = db.ref('fixedExpenses');
    feRef.on('value', snap => {
      const data = snap.val() || {};
      setFixedExpenses(Object.entries(data).map(([id, e]) => ({...e, id})));
    });

    return () => { connRef.off(); ordersRef.off(); settingsRef.off(); txRef.off(); calRef.off(); remRef.off(); pqRef.off(); arRef.off(); aeRef.off(); delRef.off(); meRef.off(); msRef.off(); feRef.off(); };
  }, [db]);

  const handleUpdateSettings = (newSettings) => {
    if (!db) return;
    setSettings(newSettings);
    const toSave = {
      marketing: newSettings.marketing,
      monthlyFixed: newSettings.monthlyFixed || 0,
      extraItems: newSettings.extraItems.reduce((acc,item,i) => ({...acc, [item.id||i]: item}), {})
    };
    db.ref('settings').update(toSave);
  };

  const filtered = useMemo(() => orders.filter(o => {
    if (filters.month && o.eventDate?.substring(0,7) !== filters.month) return false;
    if (filters.status && o.status !== filters.status) return false;
    if (filters.closedBy && o.closedBy !== filters.closedBy) return false;
    if (filters.dateFrom && (!o.eventDate || o.eventDate < filters.dateFrom)) return false;
    if (filters.dateTo   && (!o.eventDate || o.eventDate > filters.dateTo))   return false;
    return true;
  }).sort((a,b) => {
    if (!a.eventDate) return 1; if (!b.eventDate) return -1;
    return new Date(a.eventDate) - new Date(b.eventDate);
  }), [orders, filters]);

  const handleSave = (data) => {
    if (!db) return;
    const ordersRef = db.ref('orders');
    if (editing) {
      // spread existing order first so delivery/bag fields aren't wiped, then apply form data on top
      const {id: _id, ...existing} = editing;
      ordersRef.child(editing.id).set({...existing, ...data, createdAt: editing.createdAt || new Date().toISOString()});
    } else {
      ordersRef.push({...data, createdAt: new Date().toISOString()});
    }
    setShowForm(false); setEditing(null);
  };

  const handleDelete = (id) => {
    if (!db) return;
    if (window.confirm('האם למחוק את ההזמנה?')) db.ref('orders').child(id).remove();
  };

  const handleQuickUpdate = (id, fieldOrData, value) => {
    if (!db) return;
    const update = typeof fieldOrData === 'object' ? fieldOrData : {[fieldOrData]: value};
    db.ref('orders').child(id).update(update);
  };

  const handleAddTransaction = (data) => {
    if (!db) return;
    db.ref('transactions').push(data);
  };

  const handleDeleteTransaction = (id) => {
    if (!db) return;
    if (window.confirm('למחוק רשומה זו?')) db.ref('transactions').child(id).remove();
  };

  const handleUpdateTransaction = (id, data) => {
    if (!db) return;
    db.ref('transactions').child(id).update(data);
  };

  // Calendar events handlers
  const handleAddCalEvent = (data) => { if (!db) return; db.ref('calendarEvents').push(data); };
  const handleEditCalEvent = (id, data) => {
    if (!db) return;
    const existing = calendarEvents.find(e => e.id === id) || {};
    const {id: _id, ...existingClean} = existing;
    db.ref('calendarEvents').child(id).set({...existingClean, ...data, createdAt: existingClean.createdAt || data.createdAt, updatedAt: new Date().toISOString()});
  };
  const handleDeleteCalEvent = (id) => { if (!db) return; db.ref('calendarEvents').child(id).remove(); };

  // Delivery handlers
  const handleAddDelivery = (data) => { if (!db) return; db.ref('deliveries').push(data); };
  const handleDeleteDelivery = (id) => { if (!db) return; db.ref('deliveries').child(id).remove(); };
  const handleUpdateDelivery = (id, data) => { if (!db) return; db.ref('deliveries').child(id).update({...data, updatedAt: new Date().toISOString()}); };

  // Monthly settings handler (costPerBag, marketing per month)
  const handleUpdateMonthlySetting = (ym, key, value) => {
    if (!db) return;
    db.ref(`monthlySettings/${ym}`).update({[key]: value});
  };

  const handleAddMonthlyCostItem = (ym, item) => {
    if (!db) return;
    db.ref(`monthlySettings/${ym}/costBreakdown`).push(item);
  };
  const handleDeleteMonthlyCostItem = (ym, id) => {
    if (!db) return;
    db.ref(`monthlySettings/${ym}/costBreakdown/${id}`).remove();
  };

  // Monthly expenses handlers
  const handleAddMonthlyExpense = (ym, item) => {
    if (!db) return;
    db.ref(`monthlyExpenses/${ym}`).push(item);
  };
  const handleDeleteMonthlyExpense = (ym, id) => {
    if (!db) return;
    db.ref(`monthlyExpenses/${ym}/${id}`).remove();
  };

  // Fixed expenses handlers
  const handleAddFixedExpense = (data) => {
    if (!db) return;
    db.ref('fixedExpenses').push({...data, createdAt: new Date().toISOString()});
  };
  const handleDeleteFixedExpense = (id) => {
    if (!db) return;
    if (window.confirm('למחוק הוצאה קבועה זו?')) db.ref('fixedExpenses').child(id).remove();
  };

  // Bag handlers
  const handleUpdateBag = (orderId, bagIdx, bagData) => {
    if (!db) return;
    const order = orders.find(o => o.id === orderId);
    const existingBags = order?.bags ? (Array.isArray(order.bags) ? order.bags : Object.values(order.bags)) : [];
    const existingBag = existingBags[bagIdx] || {};
    db.ref(`orders/${orderId}/bags/${bagIdx}`).set({...existingBag, ...bagData});
  };
  const handleAddBag = (orderId, bagData) => {
    if (!db) return;
    const order = orders.find(o=>o.id===orderId);
    if (!order) return;
    const bags = order.bags ? (Array.isArray(order.bags) ? order.bags : Object.values(order.bags)) : [];
    db.ref(`orders/${orderId}/bags`).set([...bags, bagData]);
  };

  const handleEdit = (o) => { setEditing(o); setShowForm(true); };
  const handleAdd = () => { setEditing(null); setShowForm(true); };
  const handleClose = () => { setShowForm(false); setEditing(null); };
  const handleOpenApproval = (o) => { setApprovalOrder(o); setShowApproval(true); };

  // ── Reminders / EmailJS ──
  const handleAddReminder = (data) => { if (!db) return; db.ref('reminders').push(data); };
  const handleDeleteReminder = (id) => {
    if (!db) return;
    if (window.confirm('למחוק תזכורת זו?')) db.ref('reminders').child(id).remove();
  };
  const handleToggleProductionQueue = (orderId, inQueue) => {
    if (!db) return;
    if (inQueue) db.ref('productionQueue').child(orderId).set(true);
    else db.ref('productionQueue').child(orderId).remove();
  };
  const handleClearProductionQueue = () => {
    if (!db) return;
    if (window.confirm('לנקות את כל הבחירות?')) db.ref('productionQueue').remove();
  };

  const handleUpdateEmailjsSettings = (ejsData) => {
    if (!db) return;
    db.ref('settings/emailjs').set(ejsData);
  };

  // Auto-send due reminders
  const sendingRemindersRef = useRef(new Set());
  useEffect(() => {
    if (!db || !connected) return;
    const ejs = settings.emailjs;
    if (!ejs?.serviceId || !ejs?.templateId || !ejs?.publicKey) return;
    const today = new Date().toISOString().split('T')[0];
    const due = reminders.filter(r => !r.sent && r.reminderDate <= today && !sendingRemindersRef.current.has(r.id));
    if (due.length === 0) return;
    due.forEach(r => {
      sendingRemindersRef.current.add(r.id);
      const params = {
        to_email: r.email || ejs.defaultEmail || 'elram.malachi@gmail.com',
        event_title: r.eventTitle || '',
        event_date: fmtDate(r.eventDate) || '',
        reminder_message: r.message || '',
        reminder_time: r.reminderTime || '',
      };
      emailjs.send(ejs.serviceId, ejs.templateId, params, ejs.publicKey)
        .then(() => {
          db.ref('reminders').child(r.id).update({ sent: true, sentAt: new Date().toISOString() });
        })
        .catch(err => {
          console.error('EmailJS send error:', err);
          sendingRemindersRef.current.delete(r.id);
        });
    });
  }, [reminders, connected, settings.emailjs, db]);

  // ── Backup / Restore ──
  const backupInputRef = useRef(null);

  if (!unlocked) return <PinGate onUnlock={()=>setUnlocked(true)}/>;

  if (!db) return <div className="loading"><div className="spinner"/></div>;

  if (loading) return (
    <div className="loading">
      <div className="spinner"/>
      <div style={{color:'var(--gray-500)',fontSize:14}}>מתחבר לענן...</div>
    </div>
  );

  const handleExportBackup = () => {
    const data = {
      exportedAt: new Date().toISOString(),
      version: 1,
      orders,
      transactions,
      calendarEvents,
      monthlyExpenses,
      monthlySettings,
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `booze-bags-backup-${new Date().toISOString().split('T')[0]}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const handleImportBackup = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = '';
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        const date = data.exportedAt ? new Date(data.exportedAt).toLocaleDateString('he-IL', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : 'לא ידוע';
        const ordersCount = data.orders?.length || 0;
        const txCount = data.transactions?.length || 0;
        if (!window.confirm(`⚠️ שחזור גיבוי מ-${date}\n\nהגיבוי מכיל:\n• ${ordersCount} הזמנות\n• ${txCount} רשומות פיננסיות\n\nהנתונים הנוכחיים יידרסו לחלוטין!\nהאם להמשיך?`)) return;
        if (!db) return;
        const toObj = (arr) => { const o={}; (arr||[]).forEach(item=>{const{id,...rest}=item; if(id)o[id]=rest;}); return o; };
        if (data.orders?.length)        db.ref('orders').set(toObj(data.orders));
        if (data.transactions?.length)  db.ref('transactions').set(toObj(data.transactions));
        if (data.calendarEvents?.length)db.ref('calendarEvents').set(toObj(data.calendarEvents));
        if (data.monthlyExpenses)       db.ref('monthlyExpenses').set(data.monthlyExpenses);
        if (data.monthlySettings)       db.ref('monthlySettings').set(data.monthlySettings);
        alert('✅ הגיבוי שוחזר בהצלחה!');
      } catch(err) {
        alert('❌ שגיאה בקריאת קובץ הגיבוי — ודא שמדובר בקובץ גיבוי תקין');
      }
    };
    reader.readAsText(file);
  };

  const TABS = [
    {id:'dashboard', label:'📊  דשבורד'},
    {id:'orders',    label:'📋  הזמנות'},
    {id:'monthly',   label:'📅  סיכום חודשי'},
    {id:'calendar',  label:'🗓️  יומן'},
    {id:'bags',      label:'🛍️  שקיות'},
    {id:'production', label:'🏭  ייצור קרוב'},
    {id:'delivery',  label:'🚚  משלוח/איסוף'},
    {id:'finance',   label:'💳  הוצאות/הכנסות'},
    {id:'docs',      label:'📄  מסמכים'},
  ];

  return (
    <div className="app">
      <header className="hdr">
        <div className="hdr-in">
          <div className="hdr-logo">
            <img src="logo.jpg" alt="Booze Bags" style={{height:48,borderRadius:8}}/>
            <div>
              <div className="hdr-title">מנהל הזמנות <span className={`sync-dot${connected?'':' off'}`} title={connected?'מחובר לענן':'מנותק'}/></div>
              <div className="hdr-sub">{connected?'מחובר לענן ☁️':'מנותק'}</div>
            </div>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <button className="btn btn-outline btn-sm" title="גיבוי — הורדת כל הנתונים כ-JSON" onClick={handleExportBackup}>💾 גיבוי</button>
            <button className="btn btn-outline btn-sm" title="שחזור מגיבוי" onClick={()=>backupInputRef.current?.click()}>📂 שחזר</button>
            <input ref={backupInputRef} type="file" accept=".json" style={{display:'none'}} onChange={handleImportBackup}/>
            <button className="btn btn-white" onClick={handleAdd}>+ הזמנה חדשה</button>
            <button className="btn btn-ghost btn-sm" title="יציאה" onClick={()=>{localStorage.removeItem('bb_auth');setUnlocked(false);}}>🔒</button>
          </div>
        </div>
      </header>

      <nav className="tabs">
        <div className="tabs-in">
          {TABS.map(t=><button key={t.id} className={`tab ${tab===t.id?'act':''}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}
        </div>
      </nav>

      <main className="main">
        {tab==='dashboard' && <Dashboard orders={orders} settings={settings} onUpdateSettings={handleUpdateSettings} onAdd={handleAdd} onEdit={handleEdit}/>}
        {tab==='orders'    && <OrdersTable orders={filtered} allOrders={orders} filters={filters} onFilter={setFilters} onEdit={handleEdit} onDelete={handleDelete} onAdd={handleAdd} onQuickUpdate={handleQuickUpdate} onOpenApproval={handleOpenApproval} approvalRequests={approvalRequests}/>}
        {tab==='monthly'   && <MonthlyStats orders={orders} transactions={transactions} settings={settings} onUpdateSettings={handleUpdateSettings} monthlyExpenses={monthlyExpenses} onAddMonthlyExpense={handleAddMonthlyExpense} onDeleteMonthlyExpense={handleDeleteMonthlyExpense} monthlySettings={monthlySettings} onUpdateMonthlySetting={handleUpdateMonthlySetting} onAddCostItem={handleAddMonthlyCostItem} onDeleteCostItem={handleDeleteMonthlyCostItem} fixedExpenses={fixedExpenses}/>}
        {tab==='calendar'  && <CalendarView orders={orders} calendarEvents={calendarEvents} reminders={reminders} emailjsSettings={settings.emailjs} onEdit={handleEdit} onAddCalEvent={handleAddCalEvent} onEditCalEvent={handleEditCalEvent} onDeleteCalEvent={handleDeleteCalEvent} onAddReminder={handleAddReminder} onDeleteReminder={handleDeleteReminder} onUpdateEmailjsSettings={handleUpdateEmailjsSettings}/>}
        {tab==='bags'      && <BagsView orders={orders} onUpdateBag={handleUpdateBag} onAddBag={handleAddBag}/>}
        {tab==='production' && <ProductionView orders={orders} productionQueue={productionQueue} onToggleQueue={handleToggleProductionQueue} onClearQueue={handleClearProductionQueue}/>}
        {tab==='delivery'  && <DeliveryView orders={orders} onQuickUpdate={handleQuickUpdate}/>}
        {tab==='finance'   && <TransactionsView transactions={transactions} onAdd={handleAddTransaction} onDelete={handleDeleteTransaction} onUpdate={handleUpdateTransaction} fixedExpenses={fixedExpenses} onAddFixedExpense={handleAddFixedExpense} onDeleteFixedExpense={handleDeleteFixedExpense}/>}
        {tab==='docs'      && <DocsView orders={orders} onEdit={handleEdit}/>}
      </main>

      {showForm && <OrderForm order={editing} onSave={handleSave} onClose={handleClose}/>}
      {showApproval && approvalOrder && (
        <ApprovalModal order={approvalOrder} db={db} approvalRequests={approvalRequests} approvalEvents={approvalEvents}
          onClose={()=>{setShowApproval(false);setApprovalOrder(null);}}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js');
    });
  }
</script>
</body>
</html>
