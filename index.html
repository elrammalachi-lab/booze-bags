                <span style={{fontSize:12,color:'var(--gray-400)'}}>{filterFrom||filterTo ? `${filterFrom?new Date(filterFrom).toLocaleDateString('he-IL'):'...'} – ${filterTo?new Date(filterTo).toLocaleDateString('he-IL'):'...'}` : 'כל הזמנים'}</span>

            <div style={{padding:'0 0 8px 0'}}>

                  <tr style={{background:'var(--gray-50)',borderBottom:'2px solid var(--gray-200)'}}>

                    <th style={{padding:'8px 12px',textAlign:'center',fontWeight:700}}>ליטרים</th>
                  </tr>
                </thead>
                <tbody>
                  {cocktailStats.map(([name,s],i)=>(
                    <tr key={name} style={{background:i%2===0?'#fff':'var(--gray-50)',borderBottom:'1px solid var(--gray-100)'}}>

                    </tr>
                  ))}
                </tbody>
                <tfoot>
                  <tr style={{background:'var(--gray-100)',borderTop:'2px solid var(--gray-200)',fontWeight:700}}>
                    <td style={{padding:'8px 16px'}}>סה״כ</td>
                    <td style={{padding:'8px 12px',textAlign:'center'}}>{cocktailStats.reduce((s,[,v])=>s+v.bags,0)}</td>
                    <td style={{padding:'8px 12px',textAlign:'center',color:'var(--primary)'}}>{(cocktailStats.reduce((s,[,v])=>s+v.bags,0) * ML_PER_BAG / 1000).toFixed(2)} ל׳</td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        </>
      )}
      <div className="filters" style={{flexWrap:'wrap',rowGap:8}}>

        <span style={{fontSize:12,color:'var(--gray-500)'}}>לקוח:</span>
        <select className="f-sel" value={filter} onChange={e=>setFilter(e.target.value)}>
          <option value="">הכל</option>
          {customers.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
        <div className="f-div"/>
        <label style={{fontSize:12,color:'var(--gray-500)',display:'flex',alignItems:'center',gap:4}}>
          מ: <input type="date" value={filterFrom} onChange={e=>setFilterFrom(e.target.value)} style={{fontSize:12,padding:'3px 6px',borderRadius:6,border:'1px solid var(--gray-300)',fontFamily:'inherit'}}/>
        </label>
        <label style={{fontSize:12,color:'var(--gray-500)',display:'flex',alignItems:'center',gap:4}}>
          עד: <input type="date" value={filterTo} onChange={e=>setFilterTo(e.target.value)} style={{fontSize:12,padding:'3px 6px',borderRadius:6,border:'1px solid var(--gray-300)',fontFamily:'inherit'}}/>
        </label>
        {(filterFrom||filterTo) && <button onClick={()=>{setFilterFrom('');setFilterTo('');}} style={{fontSize:11,padding:'3px 8px',borderRadius:6,border:'1px solid var(--gray-300)',background:'var(--gray-100)',cursor:'pointer',color:'var(--gray-600)'}}>✕ נקה תאריכים</button>}
        <span className="f-count">{filtered.length} שקיות{(filterFrom||filterTo)&&dateFilteredBags.length!==allBags.length?` (מתוך ${allBags.length})`:''}</span>
        <div style={{marginRight:'auto',display:'flex',gap:8}}>
          <button className="btn btn-pri" style={{fontSize:13,padding:'6px 14px'}} onClick={openAdd}>+ הוסף שקית</button>
          <button className="btn btn-outline" style={{fontSize:13,padding:'6px 14px',color:'var(--green)',borderColor:'var(--green)',fontWeight:700,opacity:exporting?0.6:1}} onClick={exportToFactory} disabled={exporting} title="ייצוא ל-ZIP (Excel + תמונות) לשליחה למפעל">{exporting?'⏳ מכין…':'📤 ייצוא למפעל'}</button>
        </div>
      </div>
      <div className="card">
        <div className="card-hdr"><span className="card-title">🛍️ פירוט שקיות לגרפיקה</span><span style={{fontSize:12,color:'var(--gray-400)'}}>{allBags.length} שקיות סה״כ</span></div>
        {filtered.length===0 ? (
          <div className="empty"><div className="empty-icon">🛍️</div><p className="empty-txt">אין נתוני שקיות — לחץ "+ הוסף שקית" כדי להתחיל</p></div>

          <div className="tbl-wrap">
            <table>
              <thead><tr><th>תמונה</th><th>זוג</th><th>שקית</th><th>צד א — מלל</th><th>מספר תמונה</th><th>צד ב — שמות</th><th>קוקטייל</th><th>צריך תאריך?</th><th>כמות</th><th>תאריך אירוע</th><th></th></tr></thead>
              <tbody>
                {filtered.map((bag,idx)=>(
                  <tr key={idx} style={{background:idx%2===0?'#fff':'var(--gray-50)'}}>
                    <td style={{width:48,padding:'4px 8px'}}>
                      {bag.imageUrl
                        ? <img src={bag.imageUrl} alt="" style={{width:40,height:40,objectFit:'cover',borderRadius:6,border:'1.5px solid var(--gray-200)',cursor:'pointer',display:'block'}} onClick={()=>openImage(bag.imageUrl)} title="לחץ לצפייה מלאה"/>
                        : <span style={{fontSize:18,opacity:.3}}>🖼️</span>
                      }
                    </td>
                    <td className="td-b">{bag.customerName}</td>
                    <td className="td-c">{bag.bagNum}</td>
                    <td style={{maxWidth:220,fontSize:13}}>{bag.phraseA||'—'}</td>
                    <td className="td-c">{bag.imageNumA||'—'}</td>
                    <td style={{fontSize:13}}>{bag.namesB||'—'}</td>
                    <td>{bag.cocktailB?(() => { const ct=normalizeCocktail(bag.cocktailB); const cidx=COCKTAIL_TYPES.indexOf(ct); return <span className={`chip chip-${cidx>=0?cidx%7:Math.abs(ct.charCodeAt(0))%7}`}>{ct}</span>; })():'—'}</td>

                  </tr>

            </table>
          </div>
        )}
      </div>
      {showModal && (
        <BagModal
          bag={editingBag?.bag||null}
          bagIdx={editingBag?.bagIdx}
          orderId={editingBag?.orderId||''}
          orders={orders}
          onSave={handleSave}
          onClose={handleClose}
        />
      )}
    </div>
  );
}

// ── Delivery View ──
function DeliveryView({orders, onQuickUpdate}) {
  const [editingOrder, setEditingOrder] = useState(null);
  const [notes, setNotes] = useState('');
  const [delStatus, setDelStatus] = useState('ממתין');
  const [delPrice, setDelPrice] = useState('');

  const allDeliveryOrders = useMemo(() =>
    orders.filter(o => o.deliveryType && (DELIVERY_TYPES.includes(o.deliveryType) || o.deliveryType === 'איסוף'))
          .sort((a,b) => (a.eventDate||'').localeCompare(b.eventDate||'')),
    [orders]
  );

  // טבלה ראשית — עוד לא הגיע ללקוח
  const deliveryOrders = useMemo(() =>
    allDeliveryOrders.filter(o => o.status !== 'delivered'),
    [allDeliveryOrders]
  );

  // טבלה תחתונה — הגיע ללקוח
  const arrivedOrders = useMemo(() =>
    allDeliveryOrders.filter(o => o.status === 'delivered'),
    [allDeliveryOrders]
  );

  const stats = useMemo(()=>({
    total: deliveryOrders.length,
    pickup: deliveryOrders.filter(o=>o.deliveryType?.startsWith('איסוף')).length,
    delivery: deliveryOrders.filter(o=>o.deliveryType==='משלוח').length,
    arrived: arrivedOrders.length,
    pending: deliveryOrders.filter(o=>!o.deliveryStatus||o.deliveryStatus==='ממתין').length,
  }), [deliveryOrders, arrivedOrders]);

  const openEdit = (o) => { setEditingOrder(o); setNotes(o.deliveryNotes||''); setDelStatus(o.deliveryStatus||'ממתין'); setDelPrice(o.deliveryPrice||''); };
  const handleClose = () => setEditingOrder(null);
  const handleSave = () => { onQuickUpdate(editingOrder.id, {deliveryNotes:notes, deliveryStatus:delStatus, deliveryPrice:Number(delPrice)||0}); handleClose(); };

  return (
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <div className="stats-grid">
        <div className="stat-card"><div className="stat-icon si-violet">🚚</div><div><div className="stat-val">{stats.total}</div><div className="stat-lbl">סה״כ</div></div></div>
        <div className="stat-card"><div className="stat-icon si-cyan">📦</div><div><div className="stat-val">{stats.pickup}</div><div className="stat-lbl">איסופים</div></div></div>
        <div className="stat-card"><div className="stat-icon si-amber">🚛</div><div><div className="stat-val">{stats.delivery}</div><div className="stat-lbl">משלוחים</div></div></div>
        <div className="stat-card"><div className="stat-icon si-green">✅</div><div><div className="stat-val">{stats.arrived}</div><div className="stat-lbl">הגיעו</div></div></div>
      </div>

      {/* ── טבלה ראשית: עוד לא הגיע ── */}
      <div className="card">
        <div className="card-hdr">
          <span className="card-title">🚚 ממתינים לשליחה / איסוף</span>
          <span style={{fontSize:12,color:'var(--gray-400)'}}>{deliveryOrders.length} רשומות פעילות</span>
        </div>
        {deliveryOrders.length===0 ? (
          <div className="empty"><div className="empty-icon">✅</div><p className="empty-txt">אין הזמנות ממתינות — הכל טופל!</p></div>
        ) : (
          <div className="tbl-wrap">
            <table>
              <thead><tr><th>לקוח</th><th>תאריך אירוע</th><th>מיקום</th><th>כמות</th><th>סוג</th><th>מחיר משלוח</th><th>סטטוס הזמנה</th><th>סטטוס משלוח</th><th>הערות</th><th></th></tr></thead>
              <tbody>{deliveryOrders.map((o,idx)=>(
                <tr key={o.id} style={{background:idx%2===0?'#fff':'var(--gray-50)'}}>
                  <td className="td-b">{o.customerName}</td>
                  <td>{fmtDate(o.eventDate)}</td>
                  <td style={{maxWidth:160,fontSize:12}}>{o.eventLocation||'—'}</td>
                  <td className="td-c" style={{fontWeight:600}}>{o.bagCount||'—'}</td>
                  <td><span style={{fontWeight:700,color:DELIVERY_TYPE_COLOR[o.deliveryType]||'var(--gray-600)'}}>{o.deliveryType}</span></td>
                  <td className="td-c" style={{fontWeight:600,color:'var(--green)'}}>{o.deliveryPrice?`₪${Number(o.deliveryPrice).toLocaleString('he-IL')}`:'—'}</td>
                  <td><Badge status={o.status}/></td>
                  <td><span className={`del-badge ${DELIVERY_STATUS_CLASS[o.deliveryStatus||'ממתין']||'del-waiting'}`}>{o.deliveryStatus||'ממתין'}</span></td>
                  <td className="td-note" title={o.deliveryNotes||''}>{o.deliveryNotes||'—'}</td>
                  <td><button className="btn-icon" title="עדכן סטטוס / הערות" onClick={()=>openEdit(o)}>✏️</button></td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        )}
      </div>

      {/* ── טבלה תחתונה: הגיע ללקוח ── */}
      {arrivedOrders.length > 0 && (
        <div className="card">
          <div className="card-hdr" style={{background:'var(--gray-50)'}}>
            <span className="card-title" style={{color:'#065f46'}}>🚚 הגיע ללקוח</span>
            <span style={{fontSize:12,color:'var(--gray-400)'}}>{arrivedOrders.length} הזמנות שהושלמו</span>
          </div>
          <div className="tbl-wrap">
            <table>
              <thead><tr><th>לקוח</th><th>תאריך אירוע</th><th>מיקום</th><th>כמות</th><th>סוג</th><th>מחיר משלוח</th><th>הערות</th><th></th></tr></thead>
              <tbody>{arrivedOrders.map((o,idx)=>(
                <tr key={o.id} style={{background:idx%2===0?'#f0fdf4':'#dcfce7',opacity:0.85}}>
                  <td className="td-b">{o.customerName}</td>
                  <td>{fmtDate(o.eventDate)}</td>
                  <td style={{maxWidth:160,fontSize:12}}>{o.eventLocation||'—'}</td>
                  <td className="td-c" style={{fontWeight:600}}>{o.bagCount||'—'}</td>
                  <td><span style={{fontWeight:700,color:DELIVERY_TYPE_COLOR[o.deliveryType]||'var(--gray-600)'}}>{o.deliveryType}</span></td>
                  <td className="td-c" style={{fontWeight:600,color:'var(--green)'}}>{o.deliveryPrice?`₪${Number(o.deliveryPrice).toLocaleString('he-IL')}`:'—'}</td>
                  <td className="td-note" title={o.deliveryNotes||''}>{o.deliveryNotes||'—'}</td>
                  <td><button className="btn-icon" title="עדכן הערות" onClick={()=>openEdit(o)}>✏️</button></td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>
      )}

      {editingOrder && (
        <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)handleClose();}}>
          <div className="modal" style={{maxWidth:420}}>
            <div className="modal-hdr">
              <h2 className="modal-title">✏️ {editingOrder.customerName}</h2>
              <button className="modal-x" onClick={handleClose}>✕</button>
            </div>
            <div className="modal-body">
              <div className="fg">
                <div style={{fontSize:13,color:'var(--gray-500)',marginBottom:4}}>
                  {fmtDate(editingOrder.eventDate)} · {editingOrder.eventLocation||'ללא מיקום'} · <strong>{editingOrder.deliveryType}</strong>
                </div>
                <div className="fgroup">
                  <label className="flbl">סטטוס משלוח</label>
                  <select className="fsel" value={delStatus} onChange={e=>setDelStatus(e.target.value)}>
                    {DELIVERY_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
                <div className="fgroup">
                  <label className="flbl">מחיר משלוח (₪)</label>
                  <input className="finp" type="number" min="0" step="1" placeholder="0" value={delPrice} onChange={e=>setDelPrice(e.target.value)} dir="ltr" style={{textAlign:'right'}}/>
                </div>
                <div className="fgroup" style={{gridColumn:'1/-1'}}>
                  <label className="flbl">הערות משלוח</label>
                  <textarea className="ftxt" rows={4} placeholder="כתובת מדויקת, שעה, הוראות מיוחדות..." value={notes} onChange={e=>setNotes(e.target.value)}/>
                </div>
              </div>
            </div>
            <div className="modal-foot">
              <button className="btn btn-violet" onClick={handleSave}>💾 שמור</button>

          </div>
        </div>
      )}
    </div>
  );
}

// ── Dashboard ──
function Dashboard({orders, settings, onUpdateSettings, onAdd, onEdit}) {
  const s = useMemo(() => {
    const rev = orders.reduce((a,o)=>a+revenue(o),0);
    const bags = orders.reduce((a,o)=>a+(Number(o.bagCount)||0),0);
    const totalBagCost = bags * BAG_COST_PER_UNIT;
    const marketing = Number(settings.marketing)||0;
    const extraTotal = (settings.extraItems||[]).reduce((a,e)=>a+(Number(e.amount)||0),0);
    const netProfit = rev - totalBagCost - marketing - extraTotal;
    const statusCounts = STATUSES.reduce((acc,s)=>({...acc,[s.id]:orders.filter(o=>o.status===s.id).length}),{});
    statusCounts.graphics += orders.filter(o=>o.status==='open').length;
    statusCounts.photos   += orders.filter(o=>o.status==='in-progress').length;
    statusCounts.completed+= orders.filter(o=>o.status==='closed').length;
    const margin = rev>0 ? Math.round(netProfit/rev*100) : 0;
    // Team stats
    const teamCounts = TEAM_CLOSER.reduce((acc,name)=>({...acc,[name]:orders.filter(o=>o.closedBy===name).length}),{});
    return {total:orders.length,rev,netProfit,bags,statusCounts,margin,teamCounts};
  },[orders, settings]);

  const upcoming = useMemo(()=>{
    const now=new Date(); now.setHours(0,0,0,0);
    const cut=new Date(now.getTime()+60*864e5);
    return orders.filter(o=>{if(!o.eventDate)return false;const d=new Date(o.eventDate);return d>=now&&d<=cut;})
      .sort((a,b)=>new Date(a.eventDate)-new Date(b.eventDate));
  },[orders]);

  const recent = useMemo(()=>[...orders].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,6),[orders]);

  return (
    <div className="dash">
      <div className="stats-grid">
        {[
          {icon:'📦',val:s.total,lbl:'סה״כ הזמנות',color:'si-violet'},
          {icon:'💰',val:fmt(s.rev),lbl:'הכנסות כוללות',color:'si-cyan'},
          {icon:'📈',val:fmt(s.netProfit),lbl:'רווח נקי',sub:`מרווח ${s.margin}%`,color:'si-green'},
          {icon:'🛍️',val:s.bags.toLocaleString('he-IL'),lbl:'שקיות שנמכרו',color:'si-amber'},
        ].map(c=>(
          <div key={c.lbl} className="stat-card">
            <div className={`stat-icon ${c.color}`}>{c.icon}</div>
            <div><div className="stat-val">{c.val}</div><div className="stat-lbl">{c.lbl}</div>{c.sub&&<div className="stat-sub">{c.sub}</div>}</div>
          </div>
        ))}
      </div>

      <div className="status-progress">
        {STATUSES.map((st,i)=>(
          <div key={st.id} className={`sp-item sp-${i}`}>
            <span className="sp-icon">{st.icon}</span>
            <span className="sp-val">{s.statusCounts[st.id]||0}</span>
            <span className="sp-lbl">{st.label}</span>
          </div>
        ))}
      </div>

      {/* Team leaderboard */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:16}}>
        {TEAM_CLOSER.map(name=>(
          <div key={name} className="lb-card" style={{borderTopColor:TEAM_CLOSER_COLOR[name]||'var(--primary)',borderTopWidth:4,borderTopStyle:'solid'}}>
            <div style={{fontSize:13,color:'var(--gray-400)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:8}}>🏆 סגר</div>
            <div style={{display:'flex',alignItems:'baseline',gap:8}}>

          </div>
        ))}
      </div>

      {/* P&L Card */}
      <PnLCard orders={orders} settings={settings} onUpdateSettings={onUpdateSettings} />

      <div className="two-col">
        <div className="card">
          <div className="card-hdr"><span className="card-title">⏰  אירועים קרובים (60 יום)</span><span style={{fontSize:12,color:'var(--gray-400)'}}>{upcoming.length} אירועים</span></div>
          {upcoming.length===0 ? (
            <div className="empty" style={{padding:'32px 20px'}}><div className="empty-icon" style={{fontSize:36}}>📅</div><p className="empty-txt" style={{fontSize:13}}>אין אירועים קרובים</p></div>
          ) : (
            <div className="tbl-wrap"><table>

              <tbody>{upcoming.map(o=>(<tr key={o.id} className="cursor-p" onClick={()=>onEdit(o)}>
                <td className="td-b">{o.customerName}</td>
                <td>{fmtDate(o.eventDate)}</td>

          {recent.length===0 ? (

                  <PayBtn orderId={o.id} field="advancePaid" value={!!o.advancePaid}/>
                </td>
                <td className="td-c">
                  {bal>0&&<div style={{fontSize:11,fontWeight:700,color:'var(--red)',marginBottom:2}}>{fmt(bal)}</div>}
                  <PayBtn orderId={o.id} field="balancePaid" value={!!o.balancePaid}/>
                </td>
                <td className="td-c">
                  {o.confirmDoc
                    ? <button className="btn-icon" title={o.confirmDocName||'הורד מסמך'} onClick={dlDoc}>📄</button>
                    : <span style={{color:'var(--gray-200)',fontSize:16}}>—</span>}
                </td>
                <td><TeamTag who={o.closedBy}/></td>
                <td><Badge status={o.status}/></td>
                <td className="td-note" title={o.notes||''}>{o.notes||'—'}</td>
                <td><div className="actions">
                  {onOpenApproval && (() => {
                    const reqs = Object.values(approvalRequests||{}).filter(r=>r.orderId===o.id);
                    const approved = reqs.some(r=>r.status==='approved');
                    const pending  = reqs.some(r=>['pending','viewed','verified'].includes(r.status));

          </table></div>

    </div>

// ── Approval Modal (CRM side) ──
function ApprovalModal({order, db, approvalRequests, approvalEvents, onClose}) {
  const [tab, setTab]           = useState('current');
  const [generating, setGen]    = useState(false);
  const [fresh, setFresh]       = useState(null); // just-generated {token,otp,hash}
  const [copied, setCopied]     = useState('');

  // All requests for this order, newest first
  const requests = useMemo(() =>
    Object.entries(approvalRequests||{})
      .map(([id,r])=>({...r,id}))
      .filter(r=>r.orderId===order.id)
      .sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)),
  [approvalRequests, order.id]);

  const active = requests.find(r=>!['superseded','expired','blocked'].includes(r.status));

  const events = useMemo(()=>
    Object.values((approvalEvents||{})[order.id]||{})
      .sort((a,b)=>new Date(b.ts)-new Date(a.ts)),
  [approvalEvents, order.id]);

  const copy = (text, key) => {
    navigator.clipboard.writeText(text);
    setCopied(key); setTimeout(()=>setCopied(''),2000);
  };

  const handleGenerate = async () => {
    setGen(true); setFresh(null);
    try {
      // 1. Snapshot (strip large base64 images to keep size reasonable)
      const rawBags = order.bags
        ? (Array.isArray(order.bags)?order.bags:Object.values(order.bags))
        : [];
      const snapshot = {
        customerName:   order.customerName||'',
        phone:          order.phone||'',
        eventType:      order.eventType||'',
        eventDate:      order.eventDate||'',
        eventLocation:  order.eventLocation||'',
        deliveryType:   order.deliveryType||'',
        bagCount:       order.bagCount||0,
        packagePrice:   order.packagePrice||0,
        extras:         order.extras||0,
        advanceAmount:  order.advanceAmount||0,
        cocktailTypes:  order.cocktailTypes||[],
        bags:           rawBags.map(b=>({bagNum:b.bagNum,phraseA:b.phraseA,imageNumA:b.imageNumA,namesB:b.namesB,cocktailB:b.cocktailB,quantity:b.quantity,needsDate:b.needsDate})),
        notes:          order.notes||'',
        closedBy:       order.closedBy||'',
      };

      // 2. Hash
      const hash = await hashObj(snapshot);

      // 3. Fetch active legal text IDs
      let legalTextId = null, privacyTextId = null;
      const ltSnap = await db.ref('approvals/legalTexts').orderByChild('isActive').equalTo(true).once('value');
      ltSnap.forEach(s=>{ const d=s.val(); if(d.type==='orderTerms'&&!legalTextId)legalTextId=s.key; if(d.type==='privacy'&&!privacyTextId)privacyTextId=s.key; });

      // 4. Write package (immutable snapshot)
      const pkgRef = db.ref('approvals/packages').push();
      await pkgRef.set({v:1, orderId:order.id, createdAt:new Date().toISOString(), hash, snapshot, legalTextId, privacyTextId});

      // 5. Supersede existing pending requests
      const batch = {};
      requests.filter(r=>['pending','viewed','verified'].includes(r.status)).forEach(r=>{
        batch[`approvals/requests/${r.id}/status`]      = 'superseded';
        batch[`approvals/requests/${r.id}/supersededAt`]= new Date().toISOString();
      });
      if(Object.keys(batch).length) await db.ref().update(batch);

      // 6. Generate token + OTP
      const token  = genToken();
      const otp    = genOTP();
      const expiry = new Date(Date.now()+72*3600*1000).toISOString();

      // 7. Write request
      const reqRef = db.ref('approvals/requests').push();
      await reqRef.set({
        packageId:pkgRef.key, orderId:order.id, token,
        verifyCode:otp, verifyCodeExpiry:expiry,
        verifyAttempts:0, status:'pending',
        expiresAt:expiry, createdAt:new Date().toISOString(),
      });

      // 8. Token index (O(1) lookup from approval.html)
      await db.ref(`approvalsByToken/${token}`).set(reqRef.key);

      // 9. Log event
      await db.ref(`approvals/events/${order.id}/${Date.now()}`).set({
        type:'created', ts:new Date().toISOString(),
        note:`בקשת אישור v${requests.length+1} נוצרה`,
      });

      setFresh({token, otp, hash:hash.slice(0,12)+'...', expiry, requestId:reqRef.key});
    } catch(e) {
      alert('שגיאה: '+e.message); console.error(e);
    }
    setGen(false);
  };

  const activeToken  = fresh?.token || active?.token || '';
  const approvalUrl  = activeToken ? `${APPROVAL_BASE_URL}?t=${activeToken}` : '';
  const waMsg = fresh ? `שלום ${order.customerName} 👋\n\nמצורפת בקשת האישור לשקיות הקוקטייל לאירוע ${order.eventType||''} בתאריך ${fmtDate(order.eventDate)}.\n\n🔗 לאישור ההזמנה:\n${APPROVAL_BASE_URL}?t=${fresh.token}\n\n🔑 קוד האימות שלך: *${fresh.otp}*\n\nהקישור תקף ל-72 שעות.\nלשאלות — ישירות בוואטסאפ 🍹` : '';

  const downloadEvidence = (req) => {
    db.ref(`approvals/packages/${req.packageId}`).once('value').then(s=>{
      const p = s.val(); if(!p) return;
      const sn = p.snapshot||{}, au = req.auditTrail||{};
      const total=(Number(sn.packagePrice)||0)+(Number(sn.extras)||0);
      const w = window.open('','_blank');
      /* LEGAL REVIEW NOTE: This evidence bundle HTML template must be reviewed by an Israeli lawyer */
      w.document.write(`<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"/><title>ראיות אישור — ${sn.customerName}</title>
<style>body{font-family:Arial,sans-serif;direction:rtl;max-width:820px;margin:40px auto;padding:20px;color:#333;font-size:14px;}
h1{color:#7c3aed;border-bottom:3px solid #7c3aed;padding-bottom:8px;}h2{color:#4338ca;border-bottom:1px solid #e2e8f0;padding-bottom:6px;margin-top:28px;}
table{width:100%;border-collapse:collapse;margin:12px 0;}td,th{border:1px solid #e2e8f0;padding:8px 12px;text-align:right;}th{background:#f8fafc;font-weight:600;}
.stamp{background:#d1fae5;border:2px solid #6ee7b7;border-radius:8px;padding:16px;margin:16px 0;font-size:15px;}
.hash{font-family:monospace;font-size:11px;word-break:break-all;background:#f1f5f9;padding:8px;border-radius:4px;margin:6px 0;}
.legal{font-size:12px;line-height:1.75;white-space:pre-wrap;background:#f8fafc;padding:12px;border-radius:6px;border:1px solid #e2e8f0;}
.footer{margin-top:40px;font-size:11px;color:#94a3b8;border-top:1px solid #e2e8f0;padding-top:12px;}
@media print{.noprint{display:none}}</style></head><body>
<h1>🍹 Booze Bags — חבילת ראיות אישור הזמנה</h1>
<div class="stamp">✅ ההזמנה אושרה | תאריך: ${fmtDateTime(au.approvedAt)} | מזהה בקשה: ${req.id}</div>
<button class="noprint" onclick="window.print()" style="padding:10px 20px;background:#7c3aed;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;margin-bottom:20px;">🖨️ הדפס / שמור כ-PDF</button>
<h2>פרטי ההזמנה המאושרת</h2>
<table><tr><th>שם לקוח</th><td>${sn.customerName||'—'}</td></tr><tr><th>טלפון</th><td>${sn.phone||'—'}</td></tr>
<tr><th>סוג אירוע</th><td>${sn.eventType||'—'}</td></tr><tr><th>תאריך אירוע</th><td>${fmtDate(sn.eventDate)}</td></tr>
<tr><th>מיקום</th><td>${sn.eventLocation||'—'}</td></tr><tr><th>אספקה</th><td>${sn.deliveryType||'—'}</td></tr>
<tr><th>כמות שקיות</th><td>${sn.bagCount}</td></tr><tr><th>קוקטיילים</th><td>${(sn.cocktailTypes||[]).join(', ')||'—'}</td></tr>
<tr><th>מחיר כולל</th><td>₪${Number(total).toLocaleString()}</td></tr><tr><th>מקדמה</th><td>₪${Number(sn.advanceAmount||0).toLocaleString()}</td></tr>
<tr><th>הערות</th><td>${sn.notes||'—'}</td></tr></table>
<h2>מסלול ביקורת (Audit Trail)</h2>
<table><tr><th>מזהה בקשה</th><td class="hash">${req.id}</td></tr><tr><th>מזהה חבילה</th><td class="hash">${req.packageId}</td></tr>
<tr><th>Hash תוכן</th><td class="hash">${p.hash}</td></tr>
<tr><th>נוצר</th><td>${fmtDateTime(req.createdAt)}</td></tr><tr><th>נצפה</th><td>${fmtDateTime(req.viewedAt)}</td></tr>
<tr><th>אומת</th><td>${fmtDateTime(req.verifiedAt)}</td></tr><tr><th>אושר</th><td>${fmtDateTime(au.approvedAt)}</td></tr>
<tr><th>כתובת IP</th><td>${au.ip||'—'}</td></tr><tr><th>User Agent</th><td style="font-size:11px">${au.ua||'—'}</td></tr>
<tr><th>סוג מכשיר</th><td>${au.deviceType||'—'}</td></tr><tr><th>משך גלישה</th><td>${au.sessionDurationSec||0} שניות</td></tr>
<tr><th>טלפון (מוסתר)</th><td>${au.phone4Masked||'—'}</td></tr><tr><th>אימות OTP</th><td>ניסיון ${au.otpAttempts||1}</td></tr>
<tr><th>Checkboxes</th><td>${JSON.stringify(au.checkboxStates||{})}</td></tr>
<tr><th>כפתור לחוץ</th><td>${au.buttonLabel||'—'}</td></tr>
<tr><th>גרסת תנאים</th><td>${au.legalTextId||'ברירת מחדל'}</td></tr></table>
<h2>JSON ראיות (לשימוש פנימי)</h2>
<div class="hash">${JSON.stringify({requestId:req.id,packageId:req.packageId,orderId:req.orderId,packageHash:p.hash,approvedAt:au.approvedAt,ip:au.ip,phone4Masked:au.phone4Masked,checkboxStates:au.checkboxStates,deviceType:au.deviceType},null,2)}</div>
<div class="footer">מסמך זה נוצר אוטומטית. <!-- LEGAL REVIEW NOTE: consult licensed Israeli counsel before relying on this document in legal proceedings --></div>
</body></html>`);
      w.document.close();
    });
  };

  const StatusBadge = ({status}) => (
    <span style={{background:(APPROVAL_STATUS_COLORS[status]||'#94a3b8')+'22',color:APPROVAL_STATUS_COLORS[status]||'#94a3b8',border:`1px solid ${(APPROVAL_STATUS_COLORS[status]||'#94a3b8')}55`,borderRadius:20,padding:'3px 12px',fontSize:12,fontWeight:700,display:'inline-block'}}>
      {APPROVAL_STATUS_LABELS[status]||status}
    </span>
  );

  return (
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal" style={{maxWidth:660}}>
        <div className="modal-hdr">
          <h2 className="modal-title">📋 אישור הזמנה — {order.customerName}</h2>
          <button className="modal-x" onClick={onClose}>✕</button>
        </div>

        {/* Status bar */}
        <div style={{padding:'10px 20px',background:'var(--gray-50)',borderBottom:'1px solid var(--gray-100)',display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
          <span style={{fontSize:13,color:'var(--gray-500)'}}>מצב:</span>
          {active ? <StatusBadge status={active.status}/> : <span style={{fontSize:13,color:'var(--gray-400)'}}>טרם נשלחה בקשה</span>}
          {active?.viewedAt && <span style={{fontSize:11,color:'var(--gray-400)'}}>נצפה {fmtDateTime(active.viewedAt)}</span>}
          {active?.status==='approved' && <button className="btn btn-sm" style={{background:'var(--green-light)',color:'var(--green)',border:'1px solid #6ee7b7',marginRight:'auto',fontSize:12}} onClick={()=>downloadEvidence(active)}>📥 חבילת ראיות</button>}
        </div>

        {/* Tabs */}
        <div style={{display:'flex',borderBottom:'1px solid var(--gray-200)',padding:'0 20px'}}>
          {[['current','🔏 אישור'],['history','🕐 גרסאות'],['audit','📋 לוג']].map(([t,l])=>(
            <button key={t} onClick={()=>setTab(t)} style={{padding:'10px 16px',fontSize:13,fontWeight:600,cursor:'pointer',background:'none',border:'none',fontFamily:'inherit',borderBottom:`2px solid ${tab===t?'var(--primary)':'transparent'}`,color:tab===t?'var(--primary)':'var(--gray-500)'}}>
              {l}
            </button>
          ))}
        </div>

        <div className="modal-body" style={{padding:20,maxHeight:'65vh',overflowY:'auto'}}>

          {/* ── Current ── */}
          {tab==='current' && (<>
            {/* Generate button */}
            {(!active||['expired','rejected','superseded','blocked'].includes(active?.status))&&!fresh && (
              <div style={{marginBottom:20}}>
                <button className="btn btn-violet" onClick={handleGenerate} disabled={generating} style={{width:'100%',justifyContent:'center',padding:'12px'}}>
                  {generating?'⏳ יוצר בקשת אישור...':'🔏 צור בקשת אישור חדשה'}
                </button>
                <div style={{fontSize:12,color:'var(--gray-400)',marginTop:6,textAlign:'center'}}>
                  יצירת קישור מאובטח + קוד אימות + תמונת מצב מוקפאת של ההזמנה
                </div>
              </div>
            )}

            {/* Active request (no fresh data) */}
            {active&&!fresh&&!['expired','rejected','superseded','blocked'].includes(active.status) && (
              <div style={{background:'#f0fdf4',border:'1px solid #86efac',borderRadius:10,padding:14,marginBottom:14}}>
                <div style={{fontWeight:700,color:'#166534',marginBottom:8,fontSize:13}}>קישור פעיל</div>
                <div style={{display:'flex',gap:8,marginBottom:10}}>
                  <input readOnly value={`${APPROVAL_BASE_URL}?t=${active.token}`} style={{flex:1,fontSize:11,padding:'6px 8px',borderRadius:6,border:'1px solid var(--gray-200)',fontFamily:'monospace'}}/>
                  <button className="btn btn-sm btn-outline" onClick={()=>copy(`${APPROVAL_BASE_URL}?t=${active.token}`,'link')}>{copied==='link'?'✓':'העתק'}</button>
                </div>
                <button className="btn btn-outline btn-sm" onClick={handleGenerate} disabled={generating}>{generating?'...':'🔄 שלח גרסה חדשה (תחליף את הנוכחית)'}</button>
              </div>
            )}

            {/* Fresh generated */}
            {fresh && (
              <div style={{display:'flex',flexDirection:'column',gap:12}}>
                <div style={{background:'#f0fdf4',border:'1px solid #86efac',borderRadius:12,padding:16}}>
                  <div style={{fontWeight:700,color:'#166534',marginBottom:14,fontSize:15}}>✅ בקשת אישור נוצרה!</div>

                  <div style={{marginBottom:14}}>
                    <div style={{fontSize:12,fontWeight:600,color:'var(--gray-600)',marginBottom:6}}>קוד אימות ללקוח:</div>
                    <div style={{fontSize:36,fontWeight:800,letterSpacing:10,color:'var(--primary)',textAlign:'center',padding:'10px',background:'var(--primary-light)',borderRadius:10}}>{fresh.otp}</div>
                  </div>

                  <div style={{marginBottom:12}}>
                    <div style={{fontSize:12,fontWeight:600,color:'var(--gray-600)',marginBottom:6}}>קישור לאישור:</div>
                    <div style={{display:'flex',gap:8}}>
                      <input readOnly value={`${APPROVAL_BASE_URL}?t=${fresh.token}`} style={{flex:1,fontSize:11,padding:'6px 8px',borderRadius:6,border:'1px solid var(--gray-200)',fontFamily:'monospace'}}/>
                      <button className="btn btn-sm btn-outline" onClick={()=>copy(`${APPROVAL_BASE_URL}?t=${fresh.token}`,'link')}>{copied==='link'?'✓ הועתק':'העתק'}</button>
                    </div>
                  </div>

                  <div>
                    <div style={{fontSize:12,fontWeight:600,color:'var(--gray-600)',marginBottom:6}}>הודעת וואטסאפ מוכנה:</div>
                    <div style={{background:'#dcfce7',borderRadius:8,padding:12,fontSize:13,lineHeight:1.75,whiteSpace:'pre-wrap',border:'1px solid #86efac',direction:'rtl'}}>{waMsg}</div>
                    <button className="btn btn-violet" style={{width:'100%',marginTop:10,justifyContent:'center',padding:'10px'}} onClick={()=>copy(waMsg,'wa')}>
                      {copied==='wa'?'✓ הועתק ללוח!':'📋 העתק הודעה לוואטסאפ'}
                    </button>
                  </div>

                  <div style={{marginTop:10,fontSize:11,color:'var(--gray-400)'}}>
                    Hash: <span style={{fontFamily:'monospace'}}>{fresh.hash}</span> · תוקף 72 שעות
                  </div>
                </div>
              </div>
            )}
          </>)}

          {/* ── History ── */}
          {tab==='history' && (
            requests.length===0
              ? <div style={{textAlign:'center',color:'var(--gray-400)',padding:32}}>אין היסטוריה</div>
              : <div style={{display:'flex',flexDirection:'column',gap:10}}>
                  {requests.map((r,i)=>(
                    <div key={r.id} style={{border:'1px solid var(--gray-200)',borderRadius:10,padding:14,background:r.status==='approved'?'#f0fdf4':'#fff'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                        <span style={{fontWeight:700}}>גרסה {requests.length-i}</span>
                        <StatusBadge status={r.status}/>
                      </div>
                      <div style={{fontSize:12,color:'var(--gray-500)'}}>נוצר: {fmtDateTime(r.createdAt)}</div>
                      {r.viewedAt   && <div style={{fontSize:12,color:'#2563eb'}}>נצפה: {fmtDateTime(r.viewedAt)}</div>}
                      {r.verifiedAt && <div style={{fontSize:12,color:'#7c3aed'}}>אומת: {fmtDateTime(r.verifiedAt)}</div>}
                      {r.approvedAt && <div style={{fontSize:12,color:'var(--green)',fontWeight:600}}>✅ אושר: {fmtDateTime(r.approvedAt)}</div>}
                      {r.status==='rejected' && <div style={{fontSize:12,color:'var(--red)'}}>❌ {r.rejectionCategory}{r.rejectionNotes?` — ${r.rejectionNotes}`:''}</div>}
                      {r.status==='approved' && <button className="btn btn-sm" style={{marginTop:8,background:'var(--green-light)',color:'var(--green)',border:'1px solid #6ee7b7',fontSize:12}} onClick={()=>downloadEvidence(r)}>📥 הורד ראיות</button>}
                    </div>
                  ))}
                </div>
          )}

          {/* ── Audit Log ── */}
          {tab==='audit' && (
            events.length===0
              ? <div style={{textAlign:'center',color:'var(--gray-400)',padding:32}}>אין לוג</div>
              : <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  {events.map((e,i)=>(
                    <div key={i} style={{display:'flex',gap:12,alignItems:'flex-start',padding:'8px 0',borderBottom:'1px solid var(--gray-100)'}}>
                      <div style={{width:8,height:8,borderRadius:'50%',background:e.type==='approved'?'var(--green)':e.type==='rejected'?'var(--red)':'var(--primary)',flexShrink:0,marginTop:5}}/>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:500}}>{e.note}</div>
                        <div style={{fontSize:11,color:'var(--gray-400)',marginTop:2}}>{fmtDateTime(e.ts)}</div>
                      </div>
                    </div>
                  ))}
                </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Production Queue View ──
function ProductionView({orders, productionQueue, onToggleQueue, onClearQueue}) {
  const [search, setSearch] = useState('');
  const [showCompleted, setShowCompleted] = useState(false);

  const selectedIds = useMemo(() => new Set(Object.keys(productionQueue||{})), [productionQueue]);
  const selectedOrders = useMemo(() => orders.filter(o => selectedIds.has(o.id)), [orders, selectedIds]);

  const today = new Date().toISOString().split('T')[0];

  const availableOrders = useMemo(() => {
    return orders.filter(o => {
      if (o.eventDate && o.eventDate < today) return false;
      if (!showCompleted && o.status === 'completed') return false;
      if (search && !o.customerName?.includes(search) && !(o.eventType||'').includes(search)) return false;
      return true;
    }).sort((a,b) => {
      const aS = selectedIds.has(a.id)?0:1, bS = selectedIds.has(b.id)?0:1;
      if (aS!==bS) return aS-bS;
      return (a.eventDate||'').localeCompare(b.eventDate||'');
    });
  }, [orders, selectedIds, search, showCompleted]);

  const cocktailTotals = useMemo(() => {
    const stats = {};
    COCKTAIL_TYPES.forEach(c => { stats[c] = {bags:0}; });
    selectedOrders.forEach(order => {
      const bags = order.bags ? (Array.isArray(order.bags)?order.bags:Object.values(order.bags)) : [];
      bags.forEach(bag => {
        const key = normalizeCocktail(bag.cocktailB);
        if (!key) return;
        if (!stats[key]) stats[key] = {bags:0};
        stats[key].bags += Number(bag.quantity)||0;
      });
    });
    return Object.entries(stats).sort((a,b)=>b[1].bags-a[1].bags);
  }, [selectedOrders]);

  const totalBags = cocktailTotals.reduce((s,[,v])=>s+v.bags, 0);
  const totalLiters = (totalBags * ML_PER_BAG / 1000).toFixed(1);
  const noBagsOrders = selectedOrders.filter(o => {
    const bags = o.bags?(Array.isArray(o.bags)?o.bags:Object.values(o.bags)):[];
    return bags.length===0;
  });

  return (
    <div style={{display:'flex',flexDirection:'column',gap:16}}>

      {/* Stats bar */}
      {selectedOrders.length>0 && (
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:12}}>
          <div className="stat-card"><div className="stat-val">{selectedOrders.length}</div><div className="stat-lbl">אירועים נבחרים</div></div>
          <div className="stat-card"><div className="stat-val">{totalBags.toLocaleString()}</div><div className="stat-lbl">סה״כ שקיות</div></div>
          <div className="stat-card"><div className="stat-val">{totalLiters} ל׳</div><div className="stat-lbl">סה״כ ליטר</div></div>
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'340px 1fr',gap:16,alignItems:'start'}}>

        {/* ── Order selector ── */}
        <div className="card" style={{position:'sticky',top:80}}>
          <div className="card-hdr">
            <span className="card-title">📋 בחר אירועים</span>
            {selectedIds.size>0 && (
              <button className="btn btn-sm btn-outline" style={{marginRight:'auto',fontSize:11}} onClick={onClearQueue}>נקה הכל ({selectedIds.size})</button>
            )}
          </div>
          <div style={{padding:'8px 12px',borderBottom:'1px solid var(--gray-100)',display:'flex',gap:8,alignItems:'center'}}>
            <input className="finp" type="text" placeholder="חיפוש..." value={search} onChange={e=>setSearch(e.target.value)} style={{flex:1,fontSize:13,padding:'6px 10px'}}/>
            <label style={{fontSize:11,color:'var(--gray-500)',display:'flex',alignItems:'center',gap:4,whiteSpace:'nowrap',cursor:'pointer'}}>
              <input type="checkbox" checked={showCompleted} onChange={e=>setShowCompleted(e.target.checked)}/> הכל
            </label>
          </div>
          <div style={{maxHeight:520,overflowY:'auto'}}>
            {availableOrders.map(o => {
              const isSelected = selectedIds.has(o.id);
              const bags = o.bags?(Array.isArray(o.bags)?o.bags:Object.values(o.bags)):[];
              const bagTotal = bags.reduce((s,b)=>s+(Number(b.quantity)||0),0);
              return (
                <div key={o.id} onClick={()=>onToggleQueue(o.id,!isSelected)}
                  style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',
                    borderBottom:'1px solid var(--gray-100)',cursor:'pointer',
                    background:isSelected?'#eef2ff':undefined,
                    borderRight:isSelected?'3px solid var(--primary)':'3px solid transparent',
                  }}>
                  <input type="checkbox" checked={isSelected} onChange={()=>{}} style={{accentColor:'var(--primary)',width:16,height:16,flexShrink:0}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:13,color:isSelected?'var(--primary)':'var(--gray-800)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      {o.customerName}
                    </div>
                    <div style={{fontSize:11,color:'var(--gray-400)',marginTop:1}}>
                      {fmtDate(o.eventDate)}{o.eventType?` · ${o.eventType}`:''} · {bagTotal||o.bagCount||0} שק׳
                    </div>
                  </div>
                  <Badge status={o.status}/>
                </div>
              );
            })}
            {availableOrders.length===0 && (
              <div style={{padding:24,textAlign:'center',color:'var(--gray-400)',fontSize:13}}>אין הזמנות</div>
            )}
          </div>
        </div>

        {/* ── Summary ── */}
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          {selectedOrders.length===0 ? (
            <div className="card" style={{padding:48,textAlign:'center',color:'var(--gray-400)'}}>
              <div style={{fontSize:52,marginBottom:12}}>🏭</div>
              <div style={{fontWeight:700,fontSize:16,marginBottom:6,color:'var(--gray-600)'}}>בחר אירועים לייצור</div>
              <div style={{fontSize:13}}>סמן הזמנות מהרשימה משמאל</div>
            </div>
          ) : (<>

            {/* Cocktail cards */}
            <div className="card">
              <div className="card-hdr"><span className="card-title">🍸 סיכום קוקטיילים</span></div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(175px,1fr))',gap:10,padding:'12px 16px'}}>
                {cocktailTotals.map(([name,s])=>{
                  const cidx=COCKTAIL_TYPES.indexOf(name);
                  const liters=(s.bags*ML_PER_BAG/1000).toFixed(1);
                  return (
                    <div key={name} style={{background:s.bags>0?'var(--gray-50)':'#fafafa',border:`1px solid ${s.bags>0?'var(--gray-200)':'var(--gray-100)'}`,borderRadius:10,padding:'12px 14px',opacity:s.bags>0?1:0.4}}>
                      <span className={`chip chip-${cidx>=0?cidx%7:0}`}>{name}</span>
                      <div style={{fontSize:16,fontWeight:700,color:'var(--gray-800)',marginTop:8}}>{s.bags.toLocaleString()} שק׳</div>
                      <div style={{fontSize:12,color:'var(--gray-500)'}}>{liters} ליטר</div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Per-order table */}
            <div className="card">
              <div className="card-hdr"><span className="card-title">📦 פירוט לפי הזמנה</span></div>
              <div className="tbl-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>לקוח</th><th>תאריך</th><th>סוג</th>
                      {COCKTAIL_TYPES.map(c=><th key={c} style={{fontSize:10,maxWidth:72,whiteSpace:'normal',lineHeight:1.2}}>{c}</th>)}
                      <th>סה״כ שק׳</th><th>סה״כ ל׳</th>
                    </tr>
                  </thead>
                  <tbody>
                    {[...selectedOrders].sort((a,b)=>(a.eventDate||'').localeCompare(b.eventDate||'')).map(order=>{
                      const bags=order.bags?(Array.isArray(order.bags)?order.bags:Object.values(order.bags)):[];
                      const pc={};
                      bags.forEach(b=>{const k=normalizeCocktail(b.cocktailB);if(k)pc[k]=(pc[k]||0)+(Number(b.quantity)||0);});
                      const rowTotal=Object.values(pc).reduce((s,v)=>s+v,0)||order.bagCount||0;
                      const rowLiters=(rowTotal*ML_PER_BAG/1000).toFixed(1);
                      return (
                        <tr key={order.id}>
                          <td className="td-b">{order.customerName}</td>
                          <td>{fmtDate(order.eventDate)}</td>
                          <td style={{fontSize:12,color:'var(--gray-500)'}}>{order.eventType||'—'}</td>
                          {COCKTAIL_TYPES.map(c=>(
                            <td key={c} className="td-c" style={{fontWeight:pc[c]?700:400,color:pc[c]?'var(--primary)':'var(--gray-300)'}}>
                              {pc[c]||'—'}
                            </td>
                          ))}
                          <td className="td-c" style={{fontWeight:700}}>{rowTotal||'—'}</td>
                          <td className="td-c" style={{color:'var(--gray-500)'}}>{rowLiters}</td>
                        </tr>
                      );
                    })}
                    {/* Totals row */}
                    <tr style={{background:'#eef2ff',fontWeight:700,borderTop:'2px solid #c7d2fe'}}>
                      <td colSpan={3} style={{fontWeight:700,color:'var(--primary)'}}>סה״כ</td>
                      {COCKTAIL_TYPES.map(c=>{const t=cocktailTotals.find(([n])=>n===c)?.[1]?.bags||0;return<td key={c} className="td-c" style={{color:t?'var(--primary)':'var(--gray-300)'}}>{t||'—'}</td>;})}
                      <td className="td-c" style={{color:'var(--primary)'}}>{totalBags||'—'}</td>
                      <td className="td-c" style={{color:'var(--gray-500)'}}>{totalLiters}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
              {noBagsOrders.length>0 && (
                <div style={{padding:'8px 16px',background:'var(--amber-light)',borderTop:'1px solid #fcd34d',fontSize:12,color:'#92400e'}}>
                  ⚠️ אין פירוט שקיות להזמנות: {noBagsOrders.map(o=>o.customerName).join(', ')} — מוצג סה״כ שקיות בלבד
                </div>
              )}
            </div>

          </>)}
        </div>
      </div>
    </div>
  );
}

// ── Order Form ──
// ── DocsView ──
function DocsView({orders, onEdit}) {
  const docsOrders = useMemo(() =>
    [...orders].filter(o => o.confirmDoc)
               .sort((a,b)=>(b.eventDate||'').localeCompare(a.eventDate||'')),
    [orders]
  );
  const allOrders = useMemo(() =>
    [...orders].sort((a,b)=>(b.eventDate||'').localeCompare(a.eventDate||'')),
    [orders]
  );

  const dlDoc = (o) => {
    if (!o.confirmDoc) return;
    const a = document.createElement('a'); a.href = o.confirmDoc; a.download = o.confirmDocName||'אישור-הזמנה'; a.click();
  };

  return (
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <div className="stats-grid">
        <div className="stat-card"><div className="stat-icon si-violet">📄</div><div><div className="stat-val">{docsOrders.length}</div><div className="stat-lbl">מסמכים מצורפים</div></div></div>
        <div className="stat-card"><div className="stat-icon si-amber">📋</div><div><div className="stat-val">{allOrders.length - docsOrders.length}</div><div className="stat-lbl">ללא מסמך</div></div></div>
      </div>

      {/* הזמנות עם מסמך */}
      <div className="card">
        <div className="card-hdr">
          <span className="card-title">📄 אישורי הזמנה</span>
          <span style={{fontSize:12,color:'var(--gray-400)'}}>{docsOrders.length} קבצים שמורים</span>
        </div>
        {docsOrders.length === 0 ? (
          <div className="empty"><div className="empty-icon">📄</div><p className="empty-txt">אין מסמכים מצורפים עדיין — צרף מסמך Word/PDF בטופס ההזמנה</p></div>
        ) : (
          <div className="tbl-wrap"><table>
            <thead><tr><th>לקוח</th><th>תאריך אירוע</th><th>שם קובץ</th><th>סטטוס הזמנה</th><th>פעולות</th></tr></thead>
            <tbody>{docsOrders.map((o,idx)=>(
              <tr key={o.id} style={{background:idx%2===0?'#fff':'var(--gray-50)'}}>
                <td className="td-b">{o.customerName}</td>
                <td>{fmtDate(o.eventDate)}</td>
                <td>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontSize:18}}>📄</span>
                    <span style={{fontSize:13,color:'#0369a1',fontWeight:600}}>{o.confirmDocName||'מסמך'}</span>
                  </div>
                </td>
                <td><Badge status={o.status}/></td>
                <td>
                  <div className="actions">
                    <button className="btn-ghost" title="הורד מסמך" onClick={()=>dlDoc(o)}>⬇️</button>
                    <button className="btn-ghost" title="ערוך הזמנה" onClick={()=>onEdit(o)}>✏️</button>
                  </div>
                </td>
              </tr>
            ))}</tbody>
          </table></div>
        )}
      </div>

      {/* הזמנות ללא מסמך */}
      {allOrders.filter(o=>!o.confirmDoc).length > 0 && (
        <div className="card">
          <div className="card-hdr" style={{background:'var(--gray-50)'}}>
            <span className="card-title" style={{color:'var(--gray-500)'}}>📋 הזמנות ללא מסמך מצורף</span>
            <span style={{fontSize:12,color:'var(--gray-400)'}}>{allOrders.filter(o=>!o.confirmDoc).length} הזמנות</span>
          </div>
          <div className="tbl-wrap"><table>
            <thead><tr><th>לקוח</th><th>תאריך אירוע</th><th>סטטוס</th><th></th></tr></thead>
            <tbody>{allOrders.filter(o=>!o.confirmDoc).map((o,idx)=>(
              <tr key={o.id} style={{background:idx%2===0?'#fff':'var(--gray-50)',opacity:0.75}}>
                <td className="td-b">{o.customerName}</td>
                <td>{fmtDate(o.eventDate)}</td>
                <td><Badge status={o.status}/></td>
                <td><button className="btn-ghost" title="ערוך והוסף מסמך" onClick={()=>onEdit(o)}>📎 צרף</button></td>
              </tr>
            ))}</tbody>
          </table></div>
        </div>
      )}
    </div>
  );
}

const EMPTY = {customerName:'',phone:'',eventDate:'',eventType:'',eventLocation:'',bagCount:300,packagePrice:'',extras:'',status:'graphics',notes:'',advancePaid:false,balancePaid:false,advanceAmount:'',cocktailTypes:[],closedBy:'',deliveryType:'',bags:[],backImage:'',confirmDoc:'',confirmDocName:''};
function OrderForm({order, onSave, onClose}) {
  const [f, setF] = useState(()=> order ? {
    customerName:order.customerName||'',
    phone:order.phone||'',
    eventDate:order.eventDate||'',
    eventType:order.eventType||'',
    eventLocation:order.eventLocation||'',
    bagCount:order.bagCount||300,
    packagePrice:order.packagePrice===0?0:order.packagePrice||'',
    extras:order.extras||'',
    status:order.status||'open',
    notes:order.notes||'',
    advancePaid:!!order.advancePaid,
    balancePaid:!!order.balancePaid,
    advanceAmount:order.advanceAmount||'',
    cocktailTypes: Array.isArray(order.cocktailTypes) ? order.cocktailTypes.map(normalizeCocktail) : [],
    closedBy: order.closedBy||'',
    deliveryType: order.deliveryType||'',
    bags: order.bags ? (Array.isArray(order.bags) ? order.bags : Object.values(order.bags)).map(b=>({...b, cocktailB: normalizeCocktail(b.cocktailB)})) : [],
    backImage: order.backImage||'',
    confirmDoc: order.confirmDoc||'',
    confirmDocName: order.confirmDocName||'',
  } : {...EMPTY});

  const set = (k,v) => setF(p=>({...p,[k]:v}));
  const rev = (Number(f.packagePrice)||0) + (Number(f.extras)||0);
  const cost = (Number(f.bagCount)||0) * BAG_COST_PER_UNIT;
  const prof = rev - cost;

  // ── Document upload (אישור הזמנה Word/PDF) ──
  const [docUploading, setDocUploading] = useState(false);
  const handleDocUpload = (e) => {
    const file = e.target.files[0]; if (!file) return;
    e.target.value = ''; setDocUploading(true);
    const reader = new FileReader();
    reader.onload = (ev) => {
      set('confirmDoc', ev.target.result);
      set('confirmDocName', file.name);
      setDocUploading(false);
    };
    reader.onerror = () => { alert('שגיאה בקריאת הקובץ'); setDocUploading(false); };
    reader.readAsDataURL(file);
  };
  const downloadDoc = () => {
    if (!f.confirmDoc) return;
    const a = document.createElement('a'); a.href = f.confirmDoc; a.download = f.confirmDocName||'אישור-הזמנה'; a.click();
  };

  // ── Back image upload (תמונת גב — אותה תמונה לכל השקיות בהזמנה) ──
  const [backUploading, setBackUploading] = useState(false);
  const handleBackImageUpload = async (e) => {
    const file = e.target.files[0]; if (!file) return;
    e.target.value = ''; setBackUploading(true);
    try { set('backImage', await compressImage(file)); }
    catch(err) { alert(`שגיאה: ${err.message}`); }
    finally { setBackUploading(false); }
  };

  // ── Image upload per bag ──
  const [bagUpload, setBagUpload] = useState({}); // {idx: {uploading, pct}}
  const handleBagImageUpload = async (idx, e) => {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = '';
    setBagUpload(p=>({...p,[idx]:{uploading:true,pct:30}}));
    try {
      const dataUrl = await compressImage(file);
      const b = [...f.bags]; b[idx] = {...b[idx], imageUrl:dataUrl}; set('bags',b);
      setBagUpload(p=>({...p,[idx]:{uploading:false,pct:0}}));
    } catch(err) {
      console.error(err); alert(`שגיאה בעיבוד התמונה: ${err.message}`);
      setBagUpload(p=>({...p,[idx]:{uploading:false,pct:0}}));
    }
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!f.customerName.trim()) { alert('נא להזין שם לקוח'); return; }
    onSave({
      customerName:f.customerName.trim(), phone:f.phone.trim(), eventDate:f.eventDate,
      eventType:f.eventType, eventLocation:f.eventLocation.trim(),
      bagCount:Number(f.bagCount), packagePrice:Number(f.packagePrice)||0,
      extras:Number(f.extras)||0, status:f.status, notes:f.notes.trim(),
      advancePaid:!!f.advancePaid, balancePaid:!!f.balancePaid,
      advanceAmount:Number(f.advanceAmount)||0,
      cocktailTypes:(f.cocktailTypes||[]).map(normalizeCocktail), closedBy:f.closedBy||'',
      deliveryType:f.deliveryType||'', bags:(f.bags||[]).map(b=>({...b,cocktailB:normalizeCocktail(b.cocktailB)})), backImage:f.backImage||'',
      confirmDoc:f.confirmDoc||'', confirmDocName:f.confirmDocName||'',
    });
  };

  return (
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div className="modal-hdr"><h2 className="modal-title">{order?'✏️  עריכת הזמנה':'➕  הזמנה חדשה'}</h2><button className="modal-x" onClick={onClose}>✕</button></div>
        <form onSubmit={handleSubmit}>
          <div className="modal-body">
            <div className="fg">
              <div className="fg-sec">פרטי לקוח</div>
              <div className="fgroup"><label className="flbl">שם לקוח *</label><input className="finp" type="text" placeholder="שם מלא" value={f.customerName} onChange={e=>set('customerName',e.target.value)} required autoFocus/></div>
              <div className="fgroup"><label className="flbl">טלפון</label><input className="finp" type="tel" placeholder="050-0000000" value={f.phone} onChange={e=>set('phone',e.target.value)} dir="ltr" style={{textAlign:'right'}}/></div>
              <div className="fg-sec">פרטי האירוע</div>
              <div className="fgroup"><label className="flbl">תאריך אירוע</label><input className="finp" type="date" value={f.eventDate} onChange={e=>set('eventDate',e.target.value)}/></div>
              <div className="fgroup"><label className="flbl">סוג אירוע</label><select className="fsel" value={f.eventType} onChange={e=>set('eventType',e.target.value)}><option value="">בחר סוג אירוע</option>{EVENT_TYPES.map(t=><option key={t} value={t}>{t}</option>)}</select></div>
              <div className="fgroup"><label className="flbl">מיקום האירוע</label><input className="finp" type="text" placeholder="עיר / אולם / כתובת" value={f.eventLocation} onChange={e=>set('eventLocation',e.target.value)}/></div>
              <div className="fgroup"><label className="flbl">משלוח / איסוף</label>
                <select className="fsel" value={f.deliveryType} onChange={e=>set('deliveryType',e.target.value)}>
                  <option value="">— לא נקבע —</option>
                  <option value="משלוח">🚚 משלוח</option>
                  <option value="איסוף מתל אביב">📦 איסוף מתל אביב</option>
                  <option value="איסוף משדרות">📦 איסוף משדרות</option>
                </select>
              </div>
              <div className="fgroup"><label className="flbl">כמות שקיות</label><select className="fsel" value={f.bagCount} onChange={e=>set('bagCount',e.target.value)}>{BAG_COUNTS.map(n=><option key={n} value={n}>{n} שקיות</option>)}</select></div>
              <div className="fgroup"><label className="flbl">סטטוס</label><select className="fsel" value={f.status} onChange={e=>set('status',e.target.value)}>
                {STATUSES.map(s=><option key={s.id} value={s.id}>{s.icon}  {s.label}</option>)}
              </select></div>
              <div className="fgroup"><label className="flbl">מי סגר את ההזמנה</label>
                <select className="fsel" value={f.closedBy} onChange={e=>set('closedBy',e.target.value)}>
                  <option value="">— לא הוגדר —</option>
                  {TEAM_CLOSER.map(t=><option key={t} value={t}>{t}</option>)}
                </select>
              </div>
              <div className="fg-sec">תשלומים</div>
              <div className="fgroup">
                <label className="flbl">סכום מקדמה (₪)</label>
                <input className="finp" type="number" min="0" step="1" placeholder="0" value={f.advanceAmount} onChange={e=>set('advanceAmount',e.target.value)} dir="ltr" style={{textAlign:'right'}}/>
              </div>
              <div className="fgroup">
                <label className="flbl">מקדמה שולמה</label>
                <button type="button" className={`pay-btn ${f.advancePaid?'pay-yes':'pay-no'}`} style={{width:'100%',justifyContent:'center',padding:'8px'}} onClick={()=>set('advancePaid',!f.advancePaid)}>
                  {f.advancePaid ? '✅ כן — שולמה' : '❌ לא — טרם שולמה'}
                </button>
              </div>
              <div className="fgroup">
                <label className="flbl">יתרה לתשלום (₪)</label>
                <div style={{padding:'8px 12px',background:'var(--gray-50)',borderRadius:8,border:'1px solid var(--gray-200)',fontSize:15,fontWeight:700,color:(Number(f.packagePrice)||0)+(Number(f.extras)||0)-(Number(f.advanceAmount)||0)>0?'var(--red)':'var(--green)',textAlign:'right'}}>
                  {fmt(Math.max(0,(Number(f.packagePrice)||0)+(Number(f.extras)||0)-(Number(f.advanceAmount)||0)))}
                </div>
              </div>
              <div className="fgroup">
                <label className="flbl">יתרה שולמה</label>
                <button type="button" className={`pay-btn ${f.balancePaid?'pay-yes':'pay-no'}`} style={{width:'100%',justifyContent:'center',padding:'8px'}} onClick={()=>set('balancePaid',!f.balancePaid)}>
                  {f.balancePaid ? '✅ כן — שולמה' : '❌ לא — טרם שולמה'}
                </button>
              </div>
              <div className="fg-sec">סוגי קוקטיילים</div>
              <div className="fgroup fg-full">
                <label className="flbl">בחר קוקטיילים (ניתן לבחור מספר)</label>
                <div className="cocktail-grid">
                  {COCKTAIL_TYPES.map((ct,i) => {
                    const selected = (f.cocktailTypes||[]).includes(ct);
                    return (
                      <label key={ct} className={`cocktail-cb ${selected?'selected':''}`}>
                        <input type="checkbox" checked={selected} onChange={()=>{
                          const cur = f.cocktailTypes||[];
                          set('cocktailTypes', selected ? cur.filter(x=>x!==ct) : [...cur, ct]);
                        }}/>
                        <span className={`chip chip-${i%7}`}>{ct}</span>
                      </label>
                    );
                  })}
                </div>
              </div>
              <div className="fg-sec">כספים</div>
              <div className="fgroup"><label className="flbl">מחיר חבילה (₪)</label><input className="finp" type="number" min="0" step="1" placeholder="0" value={f.packagePrice} onChange={e=>set('packagePrice',e.target.value)} dir="ltr" style={{textAlign:'right'}}/></div>
              <div className="fgroup"><label className="flbl">תוספות (₪)</label><input className="finp" type="number" min="0" step="1" placeholder="0" value={f.extras} onChange={e=>set('extras',e.target.value)} dir="ltr" style={{textAlign:'right'}}/><span className="fhint">שדרוגים, תוספות מיוחדות</span></div>
              <div className="fgroup fg-full"><label className="flbl">הערות</label><textarea className="ftxt" placeholder="הערות, בקשות מיוחדות..." value={f.notes} onChange={e=>set('notes',e.target.value)}/></div>
              <div className="fg-sec">🛍️ פרטי שקיות לגרפיקה</div>

              {/* ── אישור הזמנה (Word / PDF) ── */}
              <div className="fgroup fg-full">
                <label className="flbl">📄 אישור הזמנה (Word / PDF / תמונה)</label>
                <input type="file" accept=".doc,.docx,.pdf,.odt,image/*" id="confirm-doc-input" style={{display:'none'}} onChange={handleDocUpload}/>
                {f.confirmDoc ? (
                  <div style={{display:'flex',alignItems:'center',gap:12,marginTop:6,padding:'10px 14px',background:'#f0f9ff',border:'1px solid #bae6fd',borderRadius:10}}>
                    <span style={{fontSize:26}}>📄</span>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:13,color:'#0369a1'}}>{f.confirmDocName||'מסמך'}</div>
                      <div style={{fontSize:11,color:'var(--gray-400)',marginTop:2}}>מסמך מצורף ✅</div>
                    </div>
                    <button type="button" className="btn btn-outline btn-sm" onClick={downloadDoc}>⬇️ הורד</button>
                    <button type="button" className="btn btn-outline btn-sm" onClick={()=>document.getElementById('confirm-doc-input')?.click()}>🔄 החלף</button>
                    <button type="button" className="btn btn-sm" style={{background:'var(--red)',color:'#fff',border:'none',fontSize:12}} onClick={()=>{set('confirmDoc','');set('confirmDocName','');}}>🗑️</button>
                  </div>
                ) : (
                  <div onClick={()=>!docUploading&&document.getElementById('confirm-doc-input')?.click()}
                    style={{marginTop:6,border:'2px dashed #bae6fd',borderRadius:10,padding:'14px 0',textAlign:'center',cursor:docUploading?'default':'pointer',color:'var(--gray-400)',fontSize:13,background:'#f0f9ff'}}>
                    {docUploading ? '⏳ טוען…' : <><span style={{fontSize:22,display:'block',marginBottom:4}}>📄</span>לחץ לצירוף מסמך / תמונה</>}

                <input type="file" accept="image/*" id="back-img-input" style={{display:'none'}} onChange={handleBackImageUpload}/>
                {f.backImage ? (
                  <div style={{display:'flex',alignItems:'center',gap:14,marginTop:6}}>
                    <img src={f.backImage} alt="גב שקית" style={{width:110,height:110,objectFit:'cover',borderRadius:10,border:'2px solid var(--primary)',cursor:'pointer',boxShadow:'0 2px 8px rgba(0,0,0,.12)'}} onClick={()=>openImage(f.backImage)} title="לחץ לצפייה מלאה"/>
                    <div style={{display:'flex',flexDirection:'column',gap:8}}>
                      <div style={{fontSize:12,color:'var(--gray-500)',fontWeight:600}}>תמונת גב קבועה ✅</div>
                      <button type="button" className="btn btn-outline btn-sm" onClick={()=>document.getElementById('back-img-input')?.click()}>🔄 החלף</button>
                      <button type="button" className="btn btn-sm" style={{background:'var(--red)',color:'#fff',border:'none',fontSize:12}} onClick={()=>set('backImage','')}>🗑️ הסר</button>
                    </div>
                  </div>
                ) : (
                  <div onClick={()=>!backUploading&&document.getElementById('back-img-input')?.click()}
                    style={{marginTop:6,border:'2px dashed var(--gray-300)',borderRadius:10,padding:'16px 0',textAlign:'center',cursor:backUploading?'default':'pointer',color:'var(--gray-400)',fontSize:13,background:'var(--gray-50)'}}>
                    {backUploading ? '⏳ מעבד…' : <><span style={{fontSize:24,display:'block',marginBottom:4}}>🖼️</span>לחץ להעלאת תמונת הגב</>}
                  </div>
                )}
              </div>

              <div className="fgroup fg-full">
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
